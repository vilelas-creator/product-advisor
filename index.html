<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Advisor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--bg2:#0d1424;--bg3:#0a1020;--border:#1e2d40;--text:#e2e8f0;--muted:#64748b;
  --accent:#60a5fa;--green:#22c55e;--yellow:#f59e0b;--purple:#a78bfa;--red:#ef4444;
  --input-bg:#111827;--row-border:#111827;
}
.light{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#1d4ed8;--green:#16a34a;--yellow:#d97706;--purple:#7c3aed;--red:#dc2626;
  --input-bg:#ffffff;--row-border:#f1f5f9;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;transition:background .2s,color .2s;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;min-height:48px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.logo{font-weight:700;font-size:14px;color:var(--accent);white-space:nowrap;}
.sub{font-size:10px;color:var(--muted);margin-left:4px;}
nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap;padding:3px 0;max-width:calc(100% - 280px);}
.tab{padding:4px 10px;font-size:11px;border:none;border-radius:5px;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--accent);color:#fff;font-weight:600;}
.tab:hover:not(.active){background:var(--bg3);}
.theme-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit;white-space:nowrap;}
main{padding:12px;max-width:1600px;margin:0 auto;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.card-head{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg3);}
.card-title{font-weight:600;font-size:13px;}
.card-meta{font-size:11px;color:var(--muted);margin-left:auto;}
.filters{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--bg3);}
input,select{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;outline:none;}
input{width:180px;}
.btn{padding:4px 10px;font-size:11px;font-weight:600;border:none;border-radius:5px;cursor:pointer;font-family:inherit;background:var(--bg3);color:var(--muted);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:#14532d;color:#86efac;border:1px solid #22c55e44;}
.btn-reset{background:#1e3a1e;color:var(--green);border:1px solid var(--green);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:7px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:6px 12px;border-bottom:1px solid var(--row-border);color:var(--text);vertical-align:middle;}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.pager{display:flex;gap:8px;padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);align-items:center;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center;}
.stat-n{font-size:26px;font-weight:700;color:var(--accent);}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.bar-inner{height:100%;border-radius:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
a{color:var(--accent);text-decoration:none;cursor:pointer;}
a:hover{text-decoration:underline;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:22px;}
.fg{margin-bottom:11px;}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;}
.fg textarea{min-height:55px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;}
.section{display:none;}
.section.active{display:block;}
.loading{padding:28px;text-align:center;color:var(--muted);}
.row-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--row-border);}
.pct-cell{min-width:90px;}
.comment-block{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;font-size:11px;}
.comment-meta{color:var(--muted);font-size:10px;margin-bottom:3px;}
.comment-text{color:var(--text);line-height:1.5;}
@media(max-width:768px){.stat-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}nav{gap:1px;}.tab{padding:3px 6px;font-size:10px;}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="auth-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:99999;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:36px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:32px;margin-bottom:8px">📊</div>
      <div style="font-weight:700;font-size:20px;color:var(--accent)">Product Advisor</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">CTRM & Risk Management Intelligence</div>
    </div>
    <div id="auth-tabs" style="display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <button id="tab-login" onclick="showAuthTab('login')" style="flex:1;padding:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--accent);color:#fff;font-family:inherit">Sign In</button>
      <button id="tab-register" onclick="showAuthTab('register')" style="flex:1;padding:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit">Register</button>
    </div>
    <div id="auth-login">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Email</label>
        <input id="login-email" type="email" placeholder="your@email.com" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <button onclick="doLogin()" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">Sign In</button>
      <div id="login-error" style="margin-top:12px;color:var(--red);font-size:12px;text-align:center;display:none"></div>
      <div style="text-align:center;margin-top:16px">
        <a onclick="showForgotPassword()" href="#" style="font-size:12px;color:var(--accent)">Forgot password?</a>
      </div>
    </div>
    <div id="auth-register" style="display:none">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Full Name</label>
        <input id="register-name" type="text" placeholder="Your full name" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Email</label>
        <input id="register-email" type="email" placeholder="your@email.com" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Password</label>
        <input id="register-password" type="password" placeholder="Min. 6 characters" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <button onclick="doRegister()" style="width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">Create Account</button>
      <div id="register-error" style="margin-top:12px;color:var(--red);font-size:12px;text-align:center;display:none"></div>
      <div id="register-success" style="margin-top:12px;color:var(--green);font-size:12px;text-align:center;display:none"></div>
    </div>
  </div>
</div>
<header style="display:none">
  <div><span class="logo">Product Advisor</span><span class="sub">CTRM &amp; Risk Management Intelligence</span></div>
  <nav id="nav"></nav>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
</header>
<main style="display:none">
  <div id="section-overview" class="section active"></div>
  <div id="section-vendors" class="section"></div>
  <div id="section-products" class="section"></div>
  <div id="section-commodities" class="section"></div>
  <div id="section-ctrm" class="section"></div>
  <div id="section-risk" class="section"></div>
  <div id="section-geo" class="section"></div>
  <div id="section-customertype" class="section"></div>
  <div id="section-contacts" class="section"></div>
  <div id="section-reporting" class="section"></div>
  <div id="section-import" class="section"></div>
  <div id="section-logs" class="section"></div>
</main>
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <strong id="modal-title" style="font-size:14px"></strong>
      <button class="btn" style="margin-left:auto" onclick="closeModal()">✕ Close</button>
    </div>
    <div id="modal-fields"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary" onclick="saveModal()">💾 Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script>
const SB_URL="https://hhltetlifatsskrfkywu.supabase.co";
const SB_KEY="sb_publishable_qT84fC6EBYcMndu0IW4log_ksZnx5cP";
const GROQ_MODEL="llama-3.3-70b-versatile";
const COV_COLOR={D:"#22c55e",C:"#f59e0b",N:"#ef4444",X:"#64748b"};
const COV_LABEL={D:"Deployed",C:"Capable",N:"Not Capable",X:"N/A"};
const getCode=l=>{if(!l)return"X";if(l.includes("deployed"))return"D";if(l.includes("capable"))return"C";if(l.includes("not currently"))return"N";return"X";};
let isDark=true;
let currentUser="User";

function toggleTheme(){isDark=!isDark;document.body.classList.toggle("light",!isDark);document.getElementById("theme-btn").textContent=isDark?"☀️ Light":"🌙 Dark";}

let state={vendors:[],products:[],contacts:[],ctrm:[],risk:[],geo:[],pcc:[],ct:[],commodities:[],clients:[],pages:{},filters:{},ctrmLoading:true};
let modalSaveFn=null;

async function apiFetch(table,opts={}){
  const{method="GET",body,params={}}=opts;
  let url=SB_URL+"/rest/v1/"+table;
  const qp=new URLSearchParams(params);
  if([...qp].length)url+="?"+qp;
  const res=await fetch(url,{method,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
async function getAll(table){
  const all=[];let offset=0;
  while(true){const b=await apiFetch(table,{params:{limit:1000,offset,order:"id"}});all.push(...b);if(b.length<1000)break;offset+=1000;}
  return all;
}

function bdg(label,color){return`<span class="badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${label||""}</span>`;}
function bar(pct,color){return`<div class="bar-wrap"><div class="bar-inner" style="width:${Math.min(pct,100)}%;background:${color||"var(--accent)"}"></div></div>`;}
function pagerHtml(id,page,total,per){
  const pages=Math.ceil(total/per);if(pages<=1)return"";
  return`<div class="pager"><button class="btn" onclick="changePage('${id}',${page-1})" ${page===0?"disabled":""}>← Prev</button><span>Page ${page+1} / ${pages} · ${total.toLocaleString()} records</span><button class="btn" onclick="changePage('${id}',${page+1})" ${page>=pages-1?"disabled":""}>Next →</button></div>`;
}
function changePage(id,p){state.pages[id]=Math.max(0,p);render();}

function normName(s){ return (s||"").toLowerCase().replace(/\s+/g," ").trim(); }

function findExact(arr, field, val) {
  // 1. exact match
  let m = arr.find(r => r[field] === val);
  if (m) return m[field];
  // 2. case-insensitive
  const v = normName(val);
  m = arr.find(r => normName(r[field]) === v);
  if (m) return m[field];
  // 3. one contains the other (handles typos like Platfrom vs Platform)
  m = arr.find(r => normName(r[field]).includes(v.slice(0,20)) );
  if (m) return m[field];
  return val;
}

function navToProduct(name, type) {
  const decoded = decodeURIComponent(name.replace(/%27/g,"'"));
  if (type && type.includes('Risk')) {
    const exact = findExact(state.risk, 'product', decoded);
    Object.keys(state.filters).forEach(k=>{if(k.startsWith('risk_'))delete state.filters[k];});
    state.filters['risk_prod'] = [exact];
    state.pages = {};
    setTab('risk');
  } else {
    const exact = findExact(state.pcc, 'product', decoded);
    Object.keys(state.filters).forEach(k=>{if(k.startsWith('pcc_'))delete state.filters[k];});
    state.filters['pcc_prod'] = [exact];
    state.filters['com_view'] = 'coverage';
    state.pages = {};
    setTab('commodities');
  }
}

function navToCTRMByCommodity(product, commodity) {
  const exactProd = findExact(state.ctrm, 'product', product);
  const exactCom  = findExact(state.ctrm, 'commodity', commodity);
  Object.keys(state.filters).forEach(k=>{if(k.startsWith('ctrm_'))delete state.filters[k];});
  state.filters['ctrm_prod'] = [exactProd];
  state.filters['ctrm_com']  = [exactCom];
  state.pages = {};
  setTab('ctrm');
}
function escAttr(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
document.addEventListener('click', e => {
  const link = e.target.closest('.ctrm-com-link');
  if (!link) return;
  e.preventDefault();
  navToCTRMByCommodity(link.dataset.prod, link.dataset.com);
});
function navToProductsByVendorType(vendor, type){
  // Find exact vendor name as it appears in products table
  const vn = normName(vendor);
  const exactVendor = [...new Set((state.products||[]).map(p=>p.vendor).filter(Boolean))]
    .find(pv => normName(pv)===vn || normName(pv).includes(vn.slice(0,12)) || vn.includes(normName(pv).slice(0,12)))
    || vendor;
  Object.keys(state.filters).forEach(k=>{if(k.startsWith('p_'))delete state.filters[k];});
  state.filters['p_vendor'] = exactVendor;
  state.filters['p_type'] = type;
  state.pages = {};
  setTab('products');
}
function navToContactsByVendor(vendor){
  const vn = normName(vendor);
  const exactVendor = [...new Set((state.contacts||[]).map(c=>c.vendor).filter(Boolean))]
    .find(cv => normName(cv)===vn || normName(cv).includes(vn.slice(0,12)) || vn.includes(normName(cv).slice(0,12)))
    || vendor;
  Object.keys(state.filters).forEach(k=>{if(k.startsWith('con_'))delete state.filters[k];});
  state.filters['con_vendor'] = exactVendor;
  state.pages = {};
  setTab('contacts');
}
function navToTab(tab,filterKey,filterVal){if(filterKey)state.filters[filterKey]=filterVal;state.pages={};setTab(tab);}
function sf(key,val){
  state.filters[key]=val;state.pages={};
  const aid=document.activeElement?.id;
  const ss=document.activeElement?.selectionStart;
  const se=document.activeElement?.selectionEnd;
  render();
  if(aid){const el=document.getElementById(aid);if(el){el.focus();try{el.setSelectionRange(ss,se);}catch(e){}}}
}
function resetFilters(prefix){Object.keys(state.filters).forEach(k=>{if(k.startsWith(prefix))delete state.filters[k];});state.pages={};render();}
function resetBtn(prefix){return`<button class="btn btn-reset" onclick="resetFilters('${prefix}')">↺ Reset</button>`;}
function selOpts(options,current,allLabel="All"){return`<option value="">${allLabel}</option>`+options.map(o=>`<option ${o===current?"selected":""}>${o}</option>`).join("");}

// ── COMMENTS ──
function renderComments(comments){
  if(!comments||!comments.length)return'<div style="color:var(--muted);font-size:11px;padding:4px 0">No comments yet</div>';
  return comments.map(c=>`<div class="comment-block"><div class="comment-meta">👤 ${c.user} &nbsp;·&nbsp; ${c.date}</div><div class="comment-text">${c.text}</div></div>`).join("");
}
function addComment(table,id,currentComments){
  const text=prompt("Add comment:");
  if(!text||!text.trim())return;
  const now=new Date();
  const dateStr=now.toLocaleDateString("en-GB")+", "+now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const newComment={user:currentUser,date:dateStr,text:text.trim()};
  const updated=[...(currentComments||[]),newComment];
  apiFetch(table+"?id=eq."+id,{method:"PATCH",body:{capspire_comments:JSON.stringify(updated)}})
    .then(()=>{
      if(table==="vendors")state.vendors=state.vendors.map(v=>v.id===id?{...v,capspire_comments:JSON.stringify(updated)}:v);
      else if(table==="products")state.products=state.products.map(p=>p.id===id?{...p,capspire_comments:JSON.stringify(updated)}:p);
      else if(table==="commodities")state.commodities=state.commodities.map(c=>c.id===id?{...c,capspire_comments:JSON.stringify(updated)}:c);
      render();
    }).catch(e=>alert("Error saving comment: "+e.message));
}
function parseComments(v){try{return v?JSON.parse(v):[];}catch{return[];}}
function commentCell(table,row){
  const comments=parseComments(row.capspire_comments);
  const count=comments.length;
  return`<td style="min-width:200px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted)">${count?count+" comment"+(count>1?"s":""):"No comments"}</span><button class="btn" style="font-size:10px;padding:2px 7px" onclick="showComments('${table}',${row.id})">💬 View</button><button class="btn btn-primary" style="font-size:10px;padding:2px 7px" onclick="addComment('${table}',${row.id},parseComments(${JSON.stringify(row.capspire_comments||"[]")}))">+ Add</button></div></td>`;
}
function showComments(table,id){
  const row=state[table==="vendors"?"vendors":table==="products"?"products":"commodities"].find(r=>r.id===id);
  const comments=parseComments(row?.capspire_comments);
  const d=document.createElement("div");
  d.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
  d.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px"><div style="display:flex;align-items:center;margin-bottom:14px"><strong>capSpire Comments</strong><button onclick="this.closest('div[style]').remove()" style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button></div>${renderComments(comments)}<button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="this.closest('div[style]').remove();addComment('${table}',${id},${JSON.stringify(comments)})">+ Add Comment</button></div>`;
  document.body.appendChild(d);
}

// ── TABS ──

// ── USER IDENTITY ──
function getUsername(){return localStorage.getItem("pa_username")||"";}
function ensureUsername(callback){
  const user=getUsername();if(user){callback(user);return;}
  const ov=document.createElement("div");ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px";
  const bx=document.createElement("div");bx.style.cssText="background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:400px;padding:28px;text-align:center";

function parseComments(v){try{return v?JSON.parse(v):[];}catch{return[];}}
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function saveCommentsToState(table,id,updated){
  const str=JSON.stringify(updated);
  if(table==="vendors")state.vendors=state.vendors.map(v=>v.id===id?{...v,capspire_comments:str}:v);
  else if(table==="products")state.products=state.products.map(p=>p.id===id?{...p,capspire_comments:str}:p);
  else if(table==="commodities")state.commodities=state.commodities.map(c=>c.id===id?{...c,capspire_comments:str}:c);
}
let cmtTable="",cmtId=null,cmtList=[];
function renderComments(comments){
  if(!comments||!comments.length)return "<div style='color:var(--muted);font-size:11px;padding:4px 0'>No comments yet</div>";
  return comments.map((c,i)=>
    "<div class='comment-block'><div style='display:flex;align-items:center;gap:6px;margin-bottom:4px'>" +
    "<span class='comment-meta'>&#128100; "+escH(c.user)+" &nbsp;&middot;&nbsp; "+escH(c.date)+"</span>" +
    "<button data-ci='"+i+"' data-ca='edit' style='margin-left:auto;background:none;border:1px solid var(--accent);color:var(--accent);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px'>&#9998; Edit</button>" +
    "<button data-ci='"+i+"' data-ca='del' style='background:none;border:1px solid var(--red);color:var(--red);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px'>&#128465;</button>" +
    "</div><div class='comment-text'>"+escH(c.text)+"</div></div>"
  ).join("");
}

  cb.onclick=()=>ov.remove();row.appendChild(sb);row.appendChild(cb);bx.appendChild(t);bx.appendChild(ta);bx.appendChild(row);ov.appendChild(bx);

  btn.innerHTML = "<span id='cf-coms-label'>"+label+"</span><span style='font-size:9px'>▼</span>";

function openCfComsDropdown(btn, allComs){
  // Remove existing
  document.getElementById("cf-coms-portal")?.remove();

  const rect = btn.getBoundingClientRect();
  const portal = document.createElement("div");
  portal.id = "cf-coms-portal";
  portal.style.cssText = "position:fixed;top:"+(rect.bottom+2)+"px;left:"+rect.left+"px;width:"+Math.max(rect.width,220)+"px;z-index:99999;background:var(--bg2);border:1px solid var(--border);border-radius:6px;box-shadow:0 6px 24px rgba(0,0,0,.5);font-size:12px;overflow:hidden";

  // Search
  const searchRow = document.createElement("div");
  searchRow.style.cssText = "padding:6px 8px;border-bottom:1px solid var(--border);background:var(--bg3)";
  const searchInput = document.createElement("input");
  searchInput.placeholder = "Search...";
  searchInput.style.cssText = "width:100%;padding:4px 8px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;font-family:inherit;outline:none;box-sizing:border-box";
  searchRow.appendChild(searchInput);
  portal.appendChild(searchRow);

  // Select All row
  const allRow = document.createElement("div");
  allRow.style.cssText = "display:flex;align-items:center;gap:7px;padding:5px 10px;border-bottom:2px solid var(--border);background:var(--bg3);cursor:pointer";
  const allCb = document.createElement("input");
  allCb.type = "checkbox";
  allCb.style.cssText = "cursor:pointer;accent-color:var(--accent);width:14px;height:14px;flex-shrink:0";
  const allLbl = document.createElement("span");
  allLbl.textContent = "(Select All)";
  allLbl.style.cssText = "font-weight:600;user-select:none";
  allRow.appendChild(allCb); allRow.appendChild(allLbl);
  portal.appendChild(allRow);

  // List
  const listDiv = document.createElement("div");
  listDiv.style.cssText = "max-height:200px;overflow-y:auto";
  portal.appendChild(listDiv);

  // Footer
  const footer = document.createElement("div");
  footer.style.cssText = "display:flex;gap:6px;padding:7px 10px;border-top:1px solid var(--border);background:var(--bg3);justify-content:flex-end";
  const okBtn = document.createElement("button");
  okBtn.textContent = "OK";
  okBtn.style.cssText = "padding:4px 18px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit";
  const cancelBtn = document.createElement("button");
  cancelBtn.textContent = "Cancel";
  cancelBtn.style.cssText = "padding:4px 12px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit";
  footer.appendChild(cancelBtn); footer.appendChild(okBtn);
  portal.appendChild(footer);
  document.body.appendChild(portal);

  // Pending selection
  let pending = [...(window._cfSelectedComs||[])];

  function buildList(opts){
    listDiv.innerHTML = "";
    opts.forEach(opt => {
      const row = document.createElement("label");
      row.style.cssText = "display:flex;align-items:center;gap:7px;padding:4px 10px;cursor:pointer;border-bottom:1px solid var(--row-border)";
      row.onmouseover = ()=>row.style.background="var(--bg3)";
      row.onmouseout = ()=>row.style.background="";
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.value = opt;
      cb.checked = pending.includes(opt);
      cb.style.cssText = "cursor:pointer;accent-color:var(--accent);width:14px;height:14px;flex-shrink:0";
      cb.addEventListener("change", ()=>{
        if(cb.checked){ if(!pending.includes(opt)) pending.push(opt); }
        else { pending = pending.filter(v=>v!==opt); }
        syncAll();
      });
      const lbl = document.createElement("span");
      lbl.textContent = opt;
      lbl.style.cssText = "user-select:none;font-size:12px;color:var(--text)";
      row.appendChild(cb); row.appendChild(lbl);
      listDiv.appendChild(row);
    });
    syncAll();
  }

  function syncAll(){
    const vis = [...listDiv.querySelectorAll("input[type=checkbox]")].map(c=>c.value);
    const checked = vis.filter(o=>pending.includes(o));
    allCb.checked = checked.length===vis.length && vis.length>0;
    allCb.indeterminate = checked.length>0 && checked.length<vis.length;
  }

  allCb.addEventListener("change", ()=>{
    const vis = [...listDiv.querySelectorAll("input[type=checkbox]")];
    if(allCb.checked){ vis.forEach(cb=>{ cb.checked=true; if(!pending.includes(cb.value)) pending.push(cb.value); }); }
    else { vis.forEach(cb=>{ cb.checked=false; }); pending=pending.filter(o=>!vis.map(c=>c.value).includes(o)); }
  });
  allRow.onclick = e=>{ if(e.target!==allCb){ allCb.checked=!allCb.checked; allCb.dispatchEvent(new Event("change")); } };

  searchInput.addEventListener("input", ()=>{
    const q = searchInput.value.toLowerCase();
    buildList(q ? allComs.filter(o=>o.toLowerCase().includes(q)) : allComs);
  });

  okBtn.addEventListener("click", ()=>{
    window._cfSelectedComs = [...pending];
    const lbl = document.getElementById("cf-coms-label");
    if(lbl) lbl.textContent = pending.length===0?"Select commodities...":pending.length===1?pending[0]:pending.length+" selected";
    const btnEl = document.querySelector("#cf-coms-ms-wrap button");
    if(btnEl) btnEl.style.color = pending.length>0?"var(--accent)":"var(--muted)";
    portal.remove();
  });

  cancelBtn.addEventListener("click", ()=>portal.remove());

  setTimeout(()=>{
    document.addEventListener("click", function outside(ev){
      if(!portal.contains(ev.target) && !btn.contains(ev.target)){ portal.remove(); document.removeEventListener("click",outside); }
    });
  }, 0);

  // Reposition if off screen
  requestAnimationFrame(()=>{
    const pr = portal.getBoundingClientRect();
    if(pr.bottom > window.innerHeight-10) portal.style.top = (rect.top - pr.height - 2)+"px";
  });

  buildList(allComs);
  searchInput.focus();
}

async function saveClient(productName, clientId){
  const clientName = document.getElementById("cf-client")?.value?.trim();
  if(!clientName){alert("Client name is required.");return;}

  // Get selected commodities from the multiselect
  const commodities = (window._cfSelectedComs||[]).join(", ");

  const region    = document.getElementById("cf-region")?.value?.trim()||null;
  const sinceYear = parseInt(document.getElementById("cf-year")?.value)||null;
  const notes     = document.getElementById("cf-notes")?.value?.trim()||null;
  const functionName = document.getElementById("cf-function")?.value?.trim()||null;
  const category  = document.getElementById("cf-category")?.value?.trim()||null;
  const userName  = currentUser?.email || currentUser?.user_metadata?.full_name || currentUser || "User";

  const body = {product:productName, client_name:clientName, commodities, region, since_year:sinceYear, notes, function_name:functionName, category, created_by:userName};

  try{
    if(clientId){
      await apiFetch("product_clients", {method:"PATCH", body, params:{id:"eq."+clientId}});
      const idx = state.clients.findIndex(c=>c.id===clientId);
      if(idx>-1) state.clients[idx] = {...state.clients[idx], ...body};
    } else {
      const res = await apiFetch("product_clients", {method:"POST", body});
      if(res[0]) state.clients.push(res[0]);
    }
    document.getElementById("client-form-panel")?.remove();
    // Refresh clients list in panel
    const listEl = document.getElementById("clients-list-"+productName.replace(/[^a-z0-9]/gi,'_'));
    if(listEl) listEl.innerHTML = renderClientsList(productName, state.clients.filter(c=>c.product===productName));
  } catch(e){ alert("Error saving: "+e.message); }
}

async function deleteClient(clientId, productName){
  if(!confirm("Delete this client record?")) return;
  try{
    await apiFetch("product_clients", {method:"DELETE", params:{id:"eq."+clientId}});
    state.clients = state.clients.filter(c=>c.id!==clientId);
    const listEl = document.getElementById("clients-list-"+productName.replace(/[^a-z0-9]/gi,'_'));
    if(listEl) listEl.innerHTML = renderClientsList(productName, state.clients.filter(c=>c.product===productName));
  } catch(e){ alert("Error deleting: "+e.message); }
}

function renderCommCoverage(){
  const q=(state.filters.pcc_q||"").toLowerCase();

// ── REPORT: Coverage Heatmap ──
function renderReportHeatmap(el, backBtn, report){
  const pcc = state.pcc || [];
  const products = [...new Set(pcc.map(r=>r.product))].filter(Boolean).sort();

  // Defined column order (from reference image)
  const COL_ORDER = [
    "Power","Natural Gas","HC Liquids","PetroChem / Chemicals","Coal","LNG",
    "Bulk","Break Bulk","Container",
    "Base Metals","Ferrous","Concentrates","Precious Metals",
    "North America CO2 & Emissions","Europe CO2 & Emissions",
    "FX"
  ];

  // Get all commodities from data
  const allComs = [...new Set(pcc.map(r=>r.commodity))].filter(Boolean);

  // Deduplicate: normalize commodity names for matching
  const normCom = s => (s||"").trim().toLowerCase();

  // Build ordered list: first COL_ORDER items (if they exist in data), then remaining sorted
  const orderedComs = [];
  const usedNorm = new Set();
  COL_ORDER.forEach(col => {
    // Find exact or close match in data
    const match = allComs.find(c => normCom(c) === normCom(col));
    if(match && !usedNorm.has(normCom(match))){
      orderedComs.push(match);
      usedNorm.add(normCom(match));
    }
  });
  // Add remaining commodities not in COL_ORDER
  allComs.sort().forEach(c => {
    if(!usedNorm.has(normCom(c))){
      orderedComs.push(c);
      usedNorm.add(normCom(c));
    }
  });

  const map = {};
  pcc.forEach(r=>{ map[r.product+"||"+r.commodity] = r.coverage_level; });

  const covColor  = v => v==="Covered"?"#22c55e":v&&v.includes("Partial")?"#f59e0b":v==="Not Covered"?"#ef4444":"transparent";
  const covLetter = v => v==="Covered"?"C":v&&v.includes("Partial")?"P":v==="Not Covered"?"✗":"–";
  const covOpacity= v => v?"1":".18";

  const thStyle = `padding:4px 5px;font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;text-align:center;background:var(--bg3);max-width:80px;overflow:hidden;text-overflow:ellipsis`;

  el.innerHTML=`<div style="padding:16px">${backBtn}
    <div class="card">
      <div class="card-head">
        <span class="card-title">${report.icon} ${report.title}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:8px">🟢 Covered &nbsp;🟡 Partial &nbsp;🔴 Not Covered</span>
        <button onclick="exportHeatmapExcel()" class="btn btn-success" style="margin-left:auto;font-size:11px;padding:4px 10px">⬇ Excel</button>
      </div>
      <div style="overflow:auto;max-height:74vh">
        <table id="heatmap-table" style="font-size:11px;border-collapse:collapse;min-width:100%">
          <thead><tr>
            <th style="position:sticky;left:0;z-index:3;background:var(--bg3);padding:6px 10px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;min-width:190px">PRODUCT</th>
            ${orderedComs.map(c=>`<th style="${thStyle}" title="${c}">${c}</th>`).join("")}
          </tr></thead>
          <tbody>
            ${products.map(p=>`<tr>
              <td style="position:sticky;left:0;z-index:1;background:var(--bg2);padding:5px 10px;border-bottom:1px solid var(--row-border);border-right:1px solid var(--border);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis" title="${p}">
                <a href="#" onclick="navToPccFromHeatmap('${escAttr(p)}');return false;" style="font-weight:600;color:var(--accent);text-decoration:none">${p}</a>
              </td>
              ${orderedComs.map(c=>{
                const v=map[p+"||"+c];
                const col=covColor(v);
                const op=covOpacity(v);
                return `<td style="text-align:center;padding:3px;border-bottom:1px solid var(--row-border)">
                  <span onclick="navToCtrmFromHeatmap('${escAttr(p)}','${escAttr(c)}')" title="${p} · ${c}: ${v||'–'}" style="display:inline-block;width:22px;height:22px;border-radius:4px;background:${col};color:#fff;font-size:9px;font-weight:700;line-height:22px;opacity:${op};cursor:${v?'pointer':'default'}">${covLetter(v)}</span>
                </td>`;
              }).join("")}
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  // Store for export
  window._heatmapData = {products, commodities: orderedComs, map};
}

function navToPccFromHeatmap(product){
  const exact = findExact(state.pcc, 'product', product);
  Object.keys(state.filters).forEach(k=>{if(k.startsWith('pcc_'))delete state.filters[k];});
  state.filters['pcc_prod'] = [exact || product];
  state.filters['com_view'] = 'coverage';
  state.pages = {};
  setTab('commodities');
}

function navToCtrmFromHeatmap(product, commodity){
  const exactProd = findExact(state.ctrm, 'product', product);
  const exactCom  = findExact(state.ctrm, 'commodity', commodity);
  Object.keys(state.filters).forEach(k=>{if(k.startsWith('ctrm_'))delete state.filters[k];});
  state.filters['ctrm_prod'] = [exactProd || product];
  state.filters['ctrm_com']  = [exactCom  || commodity];
  state.pages = {};
  setTab('ctrm');
}

function exportHeatmapExcel(){
  if(typeof XLSX==="undefined"){alert("Excel library not loaded, please try again.");return;}
  const {products, commodities, map} = window._heatmapData || {};
  if(!products) return;

  const wb = XLSX.utils.book_new();
  const wsData = [];

  // Header row
  wsData.push(["Product", ...commodities]);

  // Data rows
  products.forEach(p => {
    wsData.push([p, ...commodities.map(c => {
      const v = map[p+"||"+c];
      return v==="Covered"?"C": v&&v.includes("Partial")?"P": v==="Not Covered"?"✗": "–";
    })]);
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [{wch:30}, ...commodities.map(()=>({wch:10}))];

  // Apply cell colors
  const greenFill  = {type:"pattern",patternType:"solid",fgColor:{rgb:"22C55E"}};
  const yellowFill = {type:"pattern",patternType:"solid",fgColor:{rgb:"F59E0B"}};
  const redFill    = {type:"pattern",patternType:"solid",fgColor:{rgb:"EF4444"}};
  const headerFill = {type:"pattern",patternType:"solid",fgColor:{rgb:"1E293B"}};
  const whiteTxt   = {color:{rgb:"FFFFFF"}};
  const boldWhite  = {bold:true, color:{rgb:"FFFFFF"}};
  const centerAlign= {horizontal:"center",vertical:"center"};
  const boldCenter = {alignment:centerAlign, font:boldWhite};

  // Style header row
  for(let c=0; c<=commodities.length; c++){
    const cell = XLSX.utils.encode_cell({r:0, c});
    if(!ws[cell]) continue;
    ws[cell].s = {fill:headerFill, font:boldWhite, alignment:{...centerAlign, wrapText:true}};
  }

  // Style data cells
  products.forEach((p, ri) => {
    // Product name cell
    const pCell = XLSX.utils.encode_cell({r:ri+1, c:0});
    if(ws[pCell]) ws[pCell].s = {font:{bold:true}, alignment:{vertical:"center"}};

    commodities.forEach((com, ci) => {
      const v = map[p+"||"+com];
      const cell = XLSX.utils.encode_cell({r:ri+1, c:ci+1});
      if(!ws[cell]) return;
      let fill = null;
      if(v==="Covered") fill = greenFill;
      else if(v&&v.includes("Partial")) fill = yellowFill;
      else if(v==="Not Covered") fill = redFill;
      ws[cell].s = {
        fill: fill || {type:"pattern",patternType:"none"},
        font: fill ? {bold:true,color:{rgb:"FFFFFF"}} : {color:{rgb:"94A3B8"}},
        alignment: centerAlign
      };
    });
  });

  XLSX.utils.book_append_sheet(wb, ws, "Coverage Heatmap");
  XLSX.writeFile(wb, "coverage_heatmap.xlsx");
}

function renderReportVendor(el, backBtn, report){

  const geo = state.geo || [];
  const contacts = state.contacts || [];

  const data = vendors.map(v=>{
    // Use normalized matching to handle name inconsistencies between tables
    const vn = normName(v.vendor_name);
    const vProds = products.filter(p=>normName(p.vendor)===vn || normName(p.vendor).includes(vn.slice(0,12)) || vn.includes(normName(p.vendor).slice(0,12)));
    const ctrmProds = vProds.filter(p=>(p.product_type||"").toLowerCase().includes("ctrm"));
    const riskProds = vProds.filter(p=>(p.product_type||"").toLowerCase().includes("risk"));
    const vPcc = pcc.filter(p=>vProds.some(vp=>normName(vp.product_name)===normName(p.product)));
    const covTotal = vPcc.length;
    const covCovered = vPcc.filter(p=>p.coverage_level==="Covered").length;
    const covPartial = vPcc.filter(p=>p.coverage_level&&p.coverage_level.includes("Partial")).length;
    const covNot = vPcc.filter(p=>p.coverage_level==="Not Covered").length;
    const covPct = covTotal ? Math.round(covCovered/covTotal*100) : 0;
    const coms = [...new Set(vPcc.map(p=>p.commodity))].filter(Boolean);
    const vGeo = geo.filter(g=>vProds.some(vp=>normName(vp.product_name)===normName(g.product)));

function renderReportGap(el, backBtn, report){
  const pcc = state.pcc || [];

function downloadTemplate(tableId,label,cols){
  if(typeof XLSX==="undefined"){alert("Loading Excel library, please try again.");return;}
  const ws=XLSX.utils.aoa_to_sheet([cols]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Template");
  XLSX.writeFile(wb,"template_"+tableId+".xlsx");
}

async function parseFileToRows(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{defval:null,raw:false});
        const rows=raw.map(r=>{
          const obj={};
          Object.entries(r).forEach(([k,v])=>{
            const key=String(k).trim();
            const val=(v===null||v==="")?null:(!isNaN(v)&&v!=="")?Number(v):String(v).trim();
            if(val!==null&&val!=="")obj[key]=val;
          });
          return obj;
        }).filter(r=>Object.keys(r).length>0);
        resolve(rows);
      }catch(e){reject(e);}
    };
    reader.onerror=()=>reject(new Error("Could not read file"));
    reader.readAsArrayBuffer(file);
  });
}

async function importFile(event,table){
  const file=event.target.files[0];if(!file)return;
  const statusEl=document.getElementById("import-status-"+table);
  const ext=file.name.split(".").pop().toLowerCase();if(!["xlsx","xls","csv"].includes(ext)){statusEl.textContent="Please upload Excel or CSV";statusEl.style.color="var(--red)";return;}
  statusEl.textContent="Reading file...";statusEl.style.color="var(--yellow)";
  try{
    const text=await file.text();
    const lines=text.split("\n").filter(l=>l.trim());
    if(lines.length<2){statusEl.textContent="File is empty!";statusEl.style.color="var(--red)";return;}
    const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
    rows=lines.slice(1).map(line=>{
      const vals=line.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
      const obj={};
      headers.forEach((h,i)=>{const v=vals[i]||"";obj[h]=v===""?null:isNaN(v)||v===""?v:Number(v);});
      return obj;
    }).filter(r=>Object.values(r).some(v=>v!==null&&v!==""));
    statusEl.textContent="Importing "+rows.length+" records...";
    let ok=0,err=0;
    for(const row of rows){
      try{
        if(row.id){
          const ex=await apiFetch(table+"?id=eq."+row.id,{params:{limit:1}});
          if(ex.length>0)await apiFetch(table+"?id=eq."+row.id,{method:"PATCH",body:row});
          else await apiFetch(table,{method:"POST",body:row});
        }else{
          const{id,...r}=row;
          await apiFetch(table,{method:"POST",body:r});
        }
        ok++;
      }catch(e){err++;}
    }
    statusEl.textContent="✓ "+ok+" imported"+(err>0?" ("+err+" errors)":"");
    statusEl.style.color=err>0?"var(--yellow)":"var(--green)";
    // Reload affected data
    if(table==="vendors")state.vendors=await getAll("vendors");
    else if(table==="products")state.products=await getAll("products");
    else if(table==="commodities")state.commodities=await getAll("commodities");
    else if(table==="product_contacts")state.contacts=await getAll("product_contacts");
    else if(table==="geographic_coverage")state.geo=await getAll("geographic_coverage");
    else if(table==="product_commodities_coverage")state.pcc=await getAll("product_commodities_coverage");
    else if(table==="customer_type_coverage")state.ct=await getAll("customer_type_coverage");
    render();
  }catch(e){statusEl.textContent="Error: "+e.message;statusEl.style.color="var(--red)";}
}

function exportToExcel(data, filename, sheetName) {
  if (!data || data.length === 0) { alert("No data to export."); return; }
  if (typeof XLSX === "undefined") { alert("Excel library not loaded. Please refresh."); return; }
  // Clean data - remove internal fields
  const clean = data.map(row => {
    const r = {};
    Object.entries(row).forEach(([k,v]) => {
      if (k.startsWith("_")) return;
      // Format numeric percentage fields
      if (typeof v === "number" && v >= 0 && v <= 1 && k !== "id") {
        r[k] = Math.round(v * 100) + "%";
      } else {
        r[k] = v ?? "";
      }
    });
    return r;
  });
  const ws = XLSX.utils.json_to_sheet(clean);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName || "Data");
  XLSX.writeFile(wb, filename + ".xlsx");
}

// ── MULTI-SELECT DROPDOWN (Excel-style) ──
// Pending selections per dropdown (staged before OK is clicked)
const msPending = {};

function createMultiSelect(id, options, selectedValues, placeholder, filterKey) {
  const selected = selectedValues || [];
  const label = selected.length === 0 ? placeholder :
    selected.length === 1 ? selected[0] :
    selected.length + ' selected';
  // Store options list so we can rebuild the dropdown on search
  window['_msOpts_' + id] = options;
  window['_msFKey_' + id] = filterKey;
  return `<div class="ms-wrap" id="ms-${id}" style="position:relative;display:inline-block">
    <button class="ms-btn" onclick="toggleMultiSelect(event,'${id}')" style="display:flex;align-items:center;gap:6px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:${selected.length>0?'var(--accent)':'var(--text)'};padding:5px 10px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;min-width:130px;justify-content:space-between${selected.length>0?';border-color:var(--accent)':''}">
      <span class="ms-label">${label}</span><span style="font-size:9px;color:var(--muted)">▼</span>
    </button>
  </div>`;
}

function toggleMultiSelect(e, id) {
  e.stopPropagation();
  // If already open, close it
  const existing = document.getElementById('ms-portal-' + id);
  if (existing) { existing.remove(); return; }
  // Close any other open dropdowns
  document.querySelectorAll('[id^="ms-portal-"]').forEach(el => el.remove());

  const filterKey = window['_msFKey_' + id];
  const allOptions = window['_msOpts_' + id] || [];
  const currentSelected = state.filters[filterKey] || [];
  // Init pending as copy of current
  msPending[id] = [...currentSelected];

  const wrap = document.getElementById('ms-' + id);
  const rect = wrap.getBoundingClientRect();

  const portal = document.createElement('div');
  portal.id = 'ms-portal-' + id;
  portal.style.cssText = `position:fixed;top:${rect.bottom + 2}px;left:${rect.left}px;z-index:99999;
    background:var(--bg2);border:1px solid var(--border);border-radius:6px;
    box-shadow:0 6px 24px rgba(0,0,0,.5);min-width:${Math.max(rect.width, 200)}px;max-width:320px;
    font-family:system-ui,-apple-system,sans-serif;font-size:12px;color:var(--text);overflow:hidden`;

  // Search box
  const searchRow = document.createElement('div');
  searchRow.style.cssText = 'padding:6px 8px;border-bottom:1px solid var(--border);background:var(--bg3)';
  const searchInput = document.createElement('input');
  searchInput.placeholder = 'Search...';
  searchInput.style.cssText = 'width:100%;padding:4px 8px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;font-family:inherit;outline:none;box-sizing:border-box';
  searchRow.appendChild(searchInput);
  portal.appendChild(searchRow);

  // Select All row
  const allRow = document.createElement('div');
  allRow.style.cssText = 'display:flex;align-items:center;gap:7px;padding:5px 10px;border-bottom:2px solid var(--border);background:var(--bg3);cursor:pointer';
  const allCb = document.createElement('input');
  allCb.type = 'checkbox';
  allCb.style.cssText = 'cursor:pointer;accent-color:var(--accent);width:14px;height:14px;flex-shrink:0';
  const allLbl = document.createElement('span');
  allLbl.textContent = '(Select All)';
  allLbl.style.cssText = 'font-weight:600;user-select:none';
  allRow.appendChild(allCb);
  allRow.appendChild(allLbl);
  portal.appendChild(allRow);

  // List container
  const listDiv = document.createElement('div');
  listDiv.style.cssText = 'max-height:240px;overflow-y:auto';
  portal.appendChild(listDiv);

  // OK / Cancel footer
  const footer = document.createElement('div');
  footer.style.cssText = 'display:flex;gap:6px;padding:7px 10px;border-top:1px solid var(--border);background:var(--bg3);justify-content:flex-end';
  const okBtn = document.createElement('button');
  okBtn.textContent = 'OK';
  okBtn.style.cssText = 'padding:4px 18px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.cssText = 'padding:4px 12px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit';
  footer.appendChild(cancelBtn);
  footer.appendChild(okBtn);
  portal.appendChild(footer);

  document.body.appendChild(portal);

  function buildList(opts) {
    listDiv.innerHTML = '';
    opts.forEach(opt => {
      const row = document.createElement('label');
      row.style.cssText = 'display:flex;align-items:center;gap:7px;padding:4px 10px;cursor:pointer;border-bottom:1px solid var(--row-border);white-space:nowrap;overflow:hidden';
      row.onmouseover = () => row.style.background = 'var(--bg3)';
      row.onmouseout = () => row.style.background = '';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = opt;
      cb.checked = msPending[id].includes(opt);
      cb.style.cssText = 'cursor:pointer;accent-color:var(--accent);width:14px;height:14px;flex-shrink:0';
      cb.addEventListener('change', () => {
        if (cb.checked) { if (!msPending[id].includes(opt)) msPending[id].push(opt); }
        else { msPending[id] = msPending[id].filter(v => v !== opt); }
        syncAllCheckbox();
      });
      const lbl = document.createElement('span');
      lbl.textContent = opt;
      lbl.style.cssText = 'overflow:hidden;text-overflow:ellipsis;user-select:none';
      row.appendChild(cb);
      row.appendChild(lbl);
      listDiv.appendChild(row);
    });
    syncAllCheckbox();
  }

  function syncAllCheckbox() {
    const visibleOpts = getCurrentVisibleOpts();
    const checkedVisible = visibleOpts.filter(o => msPending[id].includes(o));
    if (checkedVisible.length === 0) { allCb.checked = false; allCb.indeterminate = false; }
    else if (checkedVisible.length === visibleOpts.length) { allCb.checked = true; allCb.indeterminate = false; }
    else { allCb.checked = false; allCb.indeterminate = true; }
  }

  function getCurrentVisibleOpts() {
    return [...listDiv.querySelectorAll('input[type=checkbox]')].map(cb => cb.value);
  }

  allCb.addEventListener('change', () => {
    const visOpts = getCurrentVisibleOpts();
    if (allCb.checked) {
      visOpts.forEach(o => { if (!msPending[id].includes(o)) msPending[id].push(o); });
    } else {
      msPending[id] = msPending[id].filter(o => !visOpts.includes(o));
    }
    listDiv.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = msPending[id].includes(cb.value);
    });
  });
  allRow.addEventListener('click', e => { if (e.target !== allCb) { allCb.checked = !allCb.checked; allCb.dispatchEvent(new Event('change')); } });

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase();
    buildList(q ? allOptions.filter(o => o.toLowerCase().includes(q)) : allOptions);
  });

  okBtn.addEventListener('click', () => {
    state.filters[filterKey] = [...msPending[id]];
    state.pages = {};
    portal.remove();
    // Update button label & style
    const sel = state.filters[filterKey];
    const btnEl = document.querySelector('#ms-' + id + ' .ms-btn');
    const lblEl = document.querySelector('#ms-' + id + ' .ms-label');
    if (lblEl) {
      const ph = getPlaceholder(filterKey);
      lblEl.textContent = sel.length === 0 ? ph : sel.length === 1 ? sel[0] : sel.length + ' selected';
    }
    if (btnEl) {
      btnEl.style.color = sel.length > 0 ? 'var(--accent)' : 'var(--text)';
      btnEl.style.borderColor = sel.length > 0 ? 'var(--accent)' : 'var(--border)';
    }
    render();
  });

  cancelBtn.addEventListener('click', () => { portal.remove(); });

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function outsideClick(ev) {
      if (!portal.contains(ev.target) && !wrap.contains(ev.target)) {
        portal.remove();
        document.removeEventListener('click', outsideClick);
      }
    });
  }, 0);

  // Reposition if off-screen bottom
  requestAnimationFrame(() => {
    const pr = portal.getBoundingClientRect();
    if (pr.bottom > window.innerHeight - 10) {
      portal.style.top = (rect.top - pr.height - 2) + 'px';
    }
  });

  buildList(allOptions);
  searchInput.focus();
}

function getPlaceholder(key) {
  const map = {
    'pcc_prod':'All Products','pcc_com':'All Commodities','pcc_cov':'All Coverage',
    'ctrm_prod':'All Products','ctrm_com':'All Commodities','ctrm_func':'All Functions','ctrm_cov':'All Coverage',
    'risk_prod':'All Products','risk_cat':'All Categories','risk_func':'All Functions','risk_cov':'All Coverage',
    'geo_prod':'All Products','ct_prod':'All Products','con_prod':'All Products'
  };
  return map[key] || 'All';
}

function msFilter(data, field, filterKey) {
  const selected = state.filters[filterKey];
  if (!selected || selected.length === 0) return data;
  return data.filter(r => selected.includes(r[field]));
}

// ── AUTH (using Supabase REST directly) ──
const AUTH_URL = SB_URL + "/auth/v1";
let currentSession = null;

async function authFetch(path, opts={}) {
  const {method="POST", body} = opts;
  const res = await fetch(AUTH_URL + path, {
    method,
    headers: {
      "apikey": SB_KEY,
      "Content-Type": "application/json"
    },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || data.message || "Auth error");
  return data;
}

function showAuthTab(tab) {
  document.getElementById("auth-login").style.display = tab === "login" ? "block" : "none";
  document.getElementById("auth-register").style.display = tab === "register" ? "block" : "none";
  document.getElementById("tab-login").style.background = tab === "login" ? "var(--accent)" : "var(--bg3)";
  document.getElementById("tab-login").style.color = tab === "login" ? "#fff" : "var(--muted)";
  document.getElementById("tab-register").style.background = tab === "register" ? "var(--accent)" : "var(--bg3)";
  document.getElementById("tab-register").style.color = tab === "register" ? "#fff" : "var(--muted)";
}

async function doLogin() {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  if (!email || !password) { errEl.textContent = "Please enter email and password."; errEl.style.display = "block"; return; }
  try {
    const data = await authFetch("/token?grant_type=password", {body: {email, password}});
    localStorage.setItem("pa_session", JSON.stringify({access_token: data.access_token, user: data.user}));
    onLogin(data.user);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function doRegister() {
  const name = document.getElementById("register-name").value.trim();
  const email = document.getElementById("register-email").value.trim();
  const password = document.getElementById("register-password").value;
  const errEl = document.getElementById("register-error");
  const sucEl = document.getElementById("register-success");
  errEl.style.display = "none"; sucEl.style.display = "none";
  if (!name || !email || !password) { errEl.textContent = "Please fill in all fields."; errEl.style.display = "block"; return; }
  if (password.length < 6) { errEl.textContent = "Password must be at least 6 characters."; errEl.style.display = "block"; return; }
  try {
    await authFetch("/signup", {body: {email, password, data: {full_name: name}}});
    sucEl.textContent = "Account created! You can now sign in with your email and password.";
    sucEl.style.display = "block";
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function showForgotPassword() {
  const email = prompt("Enter your email address:");
  if (!email) return;
  try {
    await authFetch("/recover", {body: {email}});
    alert("Password reset email sent! Check your inbox.");
  } catch(e) { alert("Error: " + e.message); }
}

function onLogin(user) {
  currentUser = user;
  const name = user.user_metadata?.full_name || user.email?.split("@")[0] || "User";
  localStorage.setItem("pa_username", name);
  document.getElementById("auth-screen").style.display = "none";
  document.querySelector("header").style.display = "flex";
  document.querySelector("main").style.display = "block";
  const userInfo = document.createElement("div");
  userInfo.style.cssText = "display:flex;align-items:center;gap:8px;margin-left:8px;padding-left:8px;border-left:1px solid var(--border);white-space:nowrap";
  userInfo.innerHTML = `<span style="font-size:11px;color:var(--muted)">👤 ${name}</span><button onclick="doLogout()" style="padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit">Sign Out</button>`;
  document.querySelector("header").appendChild(userInfo);
  init();
}

function doLogout() {
  localStorage.removeItem("pa_session");
  localStorage.removeItem("pa_username");
  location.reload();
}

async function checkAuth() {
  document.getElementById("auth-screen").style.display = "flex";
  // Check for existing session
  try {
    const saved = localStorage.getItem("pa_session");
    if (saved) {
      const session = JSON.parse(saved);
      if (session?.user) {
        onLogin(session.user);
        return;
      }
    }
  } catch(e) {}
  // Add keyboard listeners
  ["login-email","login-password"].forEach(id => {
    document.getElementById(id)?.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
  });
  ["register-name","register-email","register-password"].forEach(id => {
    document.getElementById(id)?.addEventListener("keydown", e => { if(e.key==="Enter") doRegister(); });
  });
}


window.addEventListener("load", function() {
  checkAuth();
});

    th.style.cssText = "padding:5px 9px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap";
    th.textContent = c.label || c.key;
    hr.appendChild(th);
  });
  thead.appendChild(hr); tbl.appendChild(thead);
  const tbody = document.createElement("tbody");
  results.forEach(row => {
    const tr = document.createElement("tr");
    columns.forEach(c => {
      const td = document.createElement("td");
      td.style.cssText = "padding:5px 9px;border-bottom:1px solid var(--row-border);font-size:11px";
      let val = row[c.key] ?? "";
      if (typeof val === "number") val = Math.round(val * 100) + "%";
      td.textContent = val;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); wrap.appendChild(tbl);
  const meta = document.createElement("div");
  meta.style.cssText = "font-size:10px;color:var(--muted);margin-top:3px;padding-left:3px";
  meta.textContent = results.length + " result" + (results.length !== 1 ? "s" : "");
  wrap.appendChild(meta); el.appendChild(wrap); el.scrollTop = el.scrollHeight;
  // Add a back to menu button
  addButtons([
    {label: "🔍 New Search", action: () => { addMsg("user","New Search"); showMainMenu(); }},
  ]);
}

function askCommoditySearch(coverageFilter) {
  const label = coverageFilter === "Covered" ? "fully covered" : "partially covered";
  addMsg("assistant", `Which commodity? (e.g. Power, Gas, FX, Bulk, LNG)`);
  const commodities = [...new Set(state.pcc.map(p=>p.commodity).filter(Boolean))].sort();
  addButtons(commodities.slice(0,15).map(c => ({
    label: c,
    action: () => {
      addMsg("user", c);
      const results = state.pcc.filter(r =>
        r.commodity === c &&
        (coverageFilter === "Partial" ? (r.coverage_level||"").includes("Partial") : (r.coverage_level||"").includes("Covered") && !(r.coverage_level||"").includes("Not"))
      );
      addMsg("assistant", `Products with ${label} coverage for ${c}:`);
      addResults(results, [{key:"product",label:"Product"},{key:"product_type",label:"Type"},{key:"coverage_level",label:"Coverage"}]);
    }
  })));
  addSearchInput("Or type a commodity name...", val => {
    const results = state.pcc.filter(r =>
      (r.commodity||"").toLowerCase().includes(val.toLowerCase()) &&
      (coverageFilter === "Partial" ? (r.coverage_level||"").includes("Partial") : (r.coverage_level||"").includes("Covered") && !(r.coverage_level||"").includes("Not"))
    );
    addMsg("assistant", `Products with ${label} coverage for "${val}":`);
    addResults(results, [{key:"product",label:"Product"},{key:"commodity",label:"Commodity"},{key:"coverage_level",label:"Coverage"}]);
  });
}

function askCommodityCount() {

function showVendorCount() {
  addMsg("user", "Vendor count by region");
  const regions = {};
  state.vendors.forEach(v => {
    const h = (v.headquarters||"").toLowerCase();
    let r = "Other";
    if (h.includes("uk")||h.includes("london")||h.includes("united kingdom")) r="United Kingdom";
    else if (h.includes("usa")||h.includes("united states")||h.includes("houston")||h.includes("new york")||h.includes("florida")||h.includes("texas")) r="USA";
    else if (h.includes("singapore")) r="Singapore";
    else if (h.includes("dubai")||h.includes("uae")) r="UAE";
    else if (h.includes("netherlands")) r="Netherlands";
    else if (h.includes("germany")||h.includes("france")||h.includes("switzerland")) r="Europe (Other)";
    else if (h.includes("india")) r="India";
    else if (h.includes("australia")) r="Australia";
    regions[r] = (regions[r]||0)+1;
  });
  const msg = Object.entries(regions).sort((a,b)=>b[1]-a[1]).map(([r,c])=>`• ${r}: ${c}`).join("\n");
  addMsg("assistant", "Vendors by region:\n" + msg);
  showMainMenu();
}

function showGeoFilter(field, threshold, label) {
  addMsg("user", `Strong ${label} coverage`);
  const results = state.geo.filter(g => (g[field]||0) >= threshold).sort((a,b)=>(b[field]||0)-(a[field]||0));
  addMsg("assistant", `Products with >50% ${label} coverage (${results.length}):`);
  addResults(results, [{key:"product",label:"Product"},{key:field,label:label+"%"}]);
}
