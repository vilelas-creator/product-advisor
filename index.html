<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Advisor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--bg2:#0d1424;--bg3:#0a1020;--border:#1e2d40;--text:#e2e8f0;--muted:#64748b;
  --accent:#60a5fa;--green:#22c55e;--yellow:#f59e0b;--purple:#a78bfa;--red:#ef4444;
  --input-bg:#111827;--row-border:#111827;
}
.light{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#1d4ed8;--green:#16a34a;--yellow:#d97706;--purple:#7c3aed;--red:#dc2626;
  --input-bg:#ffffff;--row-border:#f1f5f9;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;transition:background .2s,color .2s;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;height:48px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.logo{font-weight:700;font-size:14px;color:var(--accent);white-space:nowrap;}
.sub{font-size:10px;color:var(--muted);margin-left:4px;}
nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap;padding:3px 0;}
.tab{padding:4px 10px;font-size:11px;border:none;border-radius:5px;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--accent);color:#fff;font-weight:600;}
.tab:hover:not(.active){background:var(--bg3);}
.theme-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit;white-space:nowrap;}
main{padding:12px;max-width:1600px;margin:0 auto;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.card-head{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg3);}
.card-title{font-weight:600;font-size:13px;}
.card-meta{font-size:11px;color:var(--muted);margin-left:auto;}
.filters{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--bg3);}
input,select{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;outline:none;}
input{width:180px;}
.btn{padding:4px 10px;font-size:11px;font-weight:600;border:none;border-radius:5px;cursor:pointer;font-family:inherit;background:var(--bg3);color:var(--muted);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:#14532d;color:#86efac;border:1px solid #22c55e44;}
.btn-reset{background:#1e3a1e;color:var(--green);border:1px solid var(--green);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:7px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:6px 12px;border-bottom:1px solid var(--row-border);color:var(--text);vertical-align:middle;}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.pager{display:flex;gap:8px;padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);align-items:center;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center;}
.stat-n{font-size:26px;font-weight:700;color:var(--accent);}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.bar-inner{height:100%;border-radius:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
a{color:var(--accent);text-decoration:none;cursor:pointer;}
a:hover{text-decoration:underline;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:22px;}
.fg{margin-bottom:11px;}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;}
.fg textarea{min-height:55px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;}
.section{display:none;}
.section.active{display:block;}
.loading{padding:28px;text-align:center;color:var(--muted);}
.row-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--row-border);}
.pct-cell{min-width:90px;}
.comment-block{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;font-size:11px;}
.comment-meta{color:var(--muted);font-size:10px;margin-bottom:3px;}
.comment-text{color:var(--text);line-height:1.5;}
@media(max-width:768px){.stat-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}nav{gap:1px;}.tab{padding:3px 6px;font-size:10px;}}
</style>
</head>
<body>
<header>
  <div><span class="logo">Product Advisor</span><span class="sub">CTRM &amp; Risk Management Intelligence</span></div>
  <nav id="nav"></nav>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
</header>
<main>
  <div id="section-overview" class="section active"></div>
  <div id="section-vendors" class="section"></div>
  <div id="section-products" class="section"></div>
  <div id="section-commodities" class="section"></div>
  <div id="section-ctrm" class="section"></div>
  <div id="section-risk" class="section"></div>
  <div id="section-geo" class="section"></div>
  <div id="section-customertype" class="section"></div>
  <div id="section-contacts" class="section"></div>
  <div id="section-import" class="section"></div>
</main>
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <strong id="modal-title" style="font-size:14px"></strong>
      <button class="btn" style="margin-left:auto" onclick="closeModal()">✕ Close</button>
    </div>
    <div id="modal-fields"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary" onclick="saveModal()">💾 Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script>
const SB_URL="https://hhltetlifatsskrfkywu.supabase.co";
const SB_KEY="sb_publishable_qT84fC6EBYcMndu0IW4log_ksZnx5cP";
const GROQ_KEY="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";
const GROQ_MODEL="llama-3.3-70b-versatile";
const COV_COLOR={D:"#22c55e",C:"#f59e0b",N:"#ef4444",X:"#64748b"};
const COV_LABEL={D:"Deployed",C:"Capable",N:"Not Capable",X:"N/A"};
const getCode=l=>{if(!l)return"X";if(l.includes("deployed"))return"D";if(l.includes("capable"))return"C";if(l.includes("not currently"))return"N";return"X";};
let isDark=true;
let currentUser=localStorage.getItem("pa_username")||"";
function ensureUsername(cb){
  if(currentUser){if(cb)cb();return;}
  const d=document.createElement("div");
  d.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10001;display:flex;align-items:center;justify-content:center;padding:20px";
  d.innerHTML='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:400px;padding:24px;text-align:center"><div style="font-size:24px;margin-bottom:12px">👋</div><div style="font-weight:700;font-size:15px;margin-bottom:6px">Welcome to Product Advisor</div><div style="color:var(--muted);font-size:12px;margin-bottom:18px">Please enter your name. It will be used to identify your comments.</div><input id="uname-inp" placeholder="Your full name..." style="width:100%;margin-bottom:14px;padding:9px 12px;font-size:13px;border-radius:6px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-family:inherit;outline:none;box-sizing:border-box"><button id="uname-btn" class="btn btn-primary" style="width:100%;padding:9px;font-size:13px">Continue →</button></div>';
  document.body.appendChild(d);
  setTimeout(()=>document.getElementById("uname-inp")?.focus(),100);
  const go=()=>{const n=document.getElementById("uname-inp").value.trim();if(!n){alert("Please enter your name.");return;}currentUser=n;localStorage.setItem("pa_username",n);d.remove();if(cb)cb();};
  document.getElementById("uname-btn").onclick=go;
  document.getElementById("uname-inp").onkeydown=(e)=>{if(e.key==="Enter")go();};
}

function toggleTheme(){isDark=!isDark;document.body.classList.toggle("light",!isDark);document.getElementById("theme-btn").textContent=isDark?"☀️ Light":"🌙 Dark";}

let state={vendors:[],products:[],contacts:[],ctrm:[],risk:[],geo:[],pcc:[],ct:[],commodities:[],pages:{},filters:{},ctrmLoading:true};
let modalSaveFn=null;

async function apiFetch(table,opts={}){
  const{method="GET",body,params={}}=opts;
  let url=SB_URL+"/rest/v1/"+table;
  const qp=new URLSearchParams(params);
  if([...qp].length)url+="?"+qp;
  const res=await fetch(url,{method,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
async function getAll(table){
  const all=[];let offset=0;
  while(true){const b=await apiFetch(table,{params:{limit:1000,offset,order:"id"}});all.push(...b);if(b.length<1000)break;offset+=1000;}
  return all;
}

function bdg(label,color){return`<span class="badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${label||""}</span>`;}
function bar(pct,color){return`<div class="bar-wrap"><div class="bar-inner" style="width:${Math.min(pct,100)}%;background:${color||"var(--accent)"}"></div></div>`;}
function pagerHtml(id,page,total,per){
  const pages=Math.ceil(total/per);if(pages<=1)return"";
  return`<div class="pager"><button class="btn" onclick="changePage('${id}',${page-1})" ${page===0?"disabled":""}>← Prev</button><span>Page ${page+1} / ${pages} · ${total.toLocaleString()} records</span><button class="btn" onclick="changePage('${id}',${page+1})" ${page>=pages-1?"disabled":""}>Next →</button></div>`;
}
function changePage(id,p){state.pages[id]=Math.max(0,p);render();}
function navToTab(tab,filterKey,filterVal){if(filterKey)state.filters[filterKey]=filterVal;state.pages={};setTab(tab);}
function sf(key,val){state.filters[key]=val;state.pages={};render();}
function resetFilters(prefix){Object.keys(state.filters).forEach(k=>{if(k.startsWith(prefix))delete state.filters[k];});state.pages={};render();}
function resetBtn(prefix){return`<button class="btn btn-reset" onclick="resetFilters('${prefix}')">↺ Reset</button>`;}
function selOpts(options,current,allLabel="All"){return`<option value="">${allLabel}</option>`+options.map(o=>`<option ${o===current?"selected":""}>${o}</option>`).join("");}

// ── USER IDENTITY ──
function getCurrentUser() {
  let user = localStorage.getItem("pa_username");
  if (!user) {
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px";
    overlay.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:400px;padding:28px;text-align:center">
      <div style="font-size:28px;margin-bottom:12px">👤</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:6px">Welcome to Product Advisor</div>
      <div style="color:var(--muted);font-size:12px;margin-bottom:20px">Please enter your name to continue. This will be used to identify your comments.</div>
      <input id="username-input" placeholder="Your full name..." style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;box-sizing:border-box">
      <button id="username-save" class="btn btn-primary" style="width:100%;padding:10px;font-size:13px">Continue →</button>
    </div>`;
    document.body.appendChild(overlay);
    setTimeout(() => document.getElementById("username-input")?.focus(), 100);
    const save = () => {
      const name = document.getElementById("username-input").value.trim();
      if (!name) { document.getElementById("username-input").style.border = "1px solid var(--red)"; return; }
      localStorage.setItem("pa_username", name);
      overlay.remove();
    };
    document.getElementById("username-save").onclick = save;
    document.getElementById("username-input").onkeydown = e => { if(e.key === "Enter") save(); };
    return null;
  }
  return user;
}

// ── COMMENTS ──
function renderComments(comments) {
  if (!comments || !comments.length) return '<div style="color:var(--muted);font-size:11px;padding:4px 0">No comments yet</div>';
  return comments.map((c, i) => `<div class="comment-block">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <span class="comment-meta">👤 ${c.user} &nbsp;·&nbsp; ${c.date}</span>
      <button onclick="editComment(currentModalTable,currentModalId,${i})" style="margin-left:auto;background:none;border:none;color:var(--accent);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid var(--accent)44">✏ Edit</button>
      <button onclick="deleteComment(currentModalTable,currentModalId,${i})" style="background:none;border:none;color:var(--red);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid var(--red)44">🗑 Delete</button>
    </div>
    <div class="comment-text">${c.text}</div>
  </div>`).join("");
}

let currentModalTable = "";
let currentModalId = null;
let currentModalComments = [];

function parseComments(v) { try { return v ? JSON.parse(v) : []; } catch { return []; } }

function saveCommentsToState(table, id, updated) {
  const str = JSON.stringify(updated);
  if (table === "vendors") state.vendors = state.vendors.map(v => v.id === id ? {...v, capspire_comments: str} : v);
  else if (table === "products") state.products = state.products.map(p => p.id === id ? {...p, capspire_comments: str} : p);
  else if (table === "commodities") state.commodities = state.commodities.map(c => c.id === id ? {...c, capspire_comments: str} : c);
}

function refreshCommentsModal() {
  const el = document.getElementById("comments-list");
  if (el) el.innerHTML = renderComments(currentModalComments);
}

function editComment(table, id, idx) {
  const comment = currentModalComments[idx];
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:20000;display:flex;align-items:center;justify-content:center;padding:20px";
  overlay.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:460px;padding:20px">
    <div style="font-weight:700;font-size:14px;margin-bottom:14px">✏ Edit Comment</div>
    <textarea id="edit-comment-input" style="width:100%;min-height:90px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box">${comment.text}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="edit-save" class="btn btn-primary">💾 Save</button>
      <button onclick="this.closest('div[style]').remove()" class="btn">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  document.getElementById("edit-save").onclick = async () => {
    const newText = document.getElementById("edit-comment-input").value.trim();
    if (!newText) return;
    currentModalComments[idx] = {...comment, text: newText};
    overlay.remove();
    try {
      await apiFetch(table + "?id=eq." + id, {method:"PATCH", body:{capspire_comments: JSON.stringify(currentModalComments)}});
      saveCommentsToState(table, id, currentModalComments);
      refreshCommentsModal();
      render();
    } catch(e) { alert("Error: " + e.message); }
  };
  setTimeout(() => document.getElementById("edit-comment-input")?.focus(), 100);
}

function deleteComment(table, id, idx) {
  if (!confirm("Delete this comment?")) return;
  currentModalComments.splice(idx, 1);
  apiFetch(table + "?id=eq." + id, {method:"PATCH", body:{capspire_comments: JSON.stringify(currentModalComments)}})
    .then(() => { saveCommentsToState(table, id, currentModalComments); refreshCommentsModal(); render(); })
    .catch(e => alert("Error: " + e.message));
}

function addComment(table, id, currentComments) {
  const user = getCurrentUser();
  if (!user) { setTimeout(() => addComment(table, id, currentComments), 500); return; }
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px";
  overlay.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:460px;padding:20px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">💬 Add Comment</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Commenting as <strong style="color:var(--text)">${user}</strong> · <a onclick="localStorage.removeItem('pa_username');this.closest('div[style]').remove()" href="#" style="color:var(--accent)">Change name</a></div>
    <textarea id="comment-input" placeholder="Write your comment here..." style="width:100%;min-height:90px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="comment-save" class="btn btn-primary">💾 Save Comment</button>
      <button id="comment-cancel" class="btn">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById("comment-input")?.focus(), 100);
  document.getElementById("comment-cancel").onclick = () => overlay.remove();
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  document.getElementById("comment-save").onclick = async () => {
    const text = document.getElementById("comment-input").value.trim();
    if (!text) { alert("Please write a comment first."); return; }
    const now = new Date();
    const dateStr = now.toLocaleDateString("en-GB") + ", " + now.toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit"});
    const newComment = {user, date: dateStr, text};
    const updated = [...(currentComments || []), newComment];
    overlay.remove();
    try {
      await apiFetch(table + "?id=eq." + id, {method:"PATCH", body:{capspire_comments: JSON.stringify(updated)}});
      saveCommentsToState(table, id, updated);
      render();
    } catch(e) { alert("Error saving comment: " + e.message); }
  };
}

function commentCell(table, row) {
  const comments = parseComments(row.capspire_comments);
  const count = comments.length;
  return `<td style="min-width:180px"><div style="display:flex;align-items:center;gap:6px">
    <span style="font-size:11px;color:var(--muted)">${count ? count + " comment" + (count > 1 ? "s" : "") : "No comments"}</span>
    <button class="btn" style="font-size:10px;padding:2px 7px" onclick="showComments('${table}',${row.id})">💬 View</button>
    <button class="btn btn-primary" style="font-size:10px;padding:2px 7px" onclick="openAddComment('${table}',${row.id})">+ Add</button>
  </div></td>`;
}

function openAddComment(table, id) {
  const stateKey = table === "vendors" ? "vendors" : table === "products" ? "products" : "commodities";
  const row = state[stateKey].find(r => r.id === id);
  addComment(table, id, parseComments(row?.capspire_comments));
}

function showComments(table, id) {
  const stateKey = table === "vendors" ? "vendors" : table === "products" ? "products" : "commodities";
  const row = state[stateKey].find(r => r.id === id);
  currentModalTable = table;
  currentModalId = id;
  currentModalComments = parseComments(row?.capspire_comments);
  const d = document.createElement("div");
  d.id = "comments-modal-overlay";
  d.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
  d.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px">
    <div style="display:flex;align-items:center;margin-bottom:14px">
      <strong>💬 capSpire Comments</strong>
      <button onclick="document.getElementById('comments-modal-overlay').remove()" style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button>
    </div>
    <div id="comments-list">${renderComments(currentModalComments)}</div>
    <button class="btn btn-primary" style="margin-top:14px;width:100%" onclick="document.getElementById('comments-modal-overlay').remove();addComment('${table}',${id},currentModalComments)">+ Add Comment</button>
  </div>`;
  document.body.appendChild(d);
  d.onclick = e => { if(e.target === d) d.remove(); };
}

// ── TABS ──
const TABS=[
  {id:"overview",label:"📊 Overview"},
  {id:"vendors",label:"🏢 Vendors"},
  {id:"products",label:"📦 Products"},
  {id:"commodities",label:"🌾 Commodities"},
  {id:"ctrm",label:"⚡ CTRM"},

function downloadTemplate(tableId,label,cols){
  const csv=cols.join(",")+",capspire_comments\n";
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="template_"+tableId+".csv";
  a.click();
}

async function importCSV(event,table){
  const file=event.target.files[0];if(!file)return;
  const statusEl=document.getElementById("import-status-"+table);
  if(!file.name.endsWith(".csv")){statusEl.textContent="Error: Please upload a .csv file, not Excel";statusEl.style.color="var(--red)";return;}
  statusEl.textContent="Reading file...";statusEl.style.color="var(--yellow)";
  try{
    const text=await file.text();
    const lines=text.split("\n").filter(l=>l.trim());
    if(lines.length<2){statusEl.textContent="File is empty!";statusEl.style.color="var(--red)";return;}
    const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
    const rows=lines.slice(1).map(line=>{
      const vals=line.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
      const obj={};
      headers.forEach((h,i)=>{const v=vals[i]||"";obj[h]=v===""?null:isNaN(v)||v===""?v:Number(v);});
      return obj;
    }).filter(r=>Object.values(r).some(v=>v!==null&&v!==""));
    statusEl.textContent="Importing "+rows.length+" records...";
    let ok=0,err=0;
    for(const row of rows){
      try{
        if(row.id){
          const ex=await apiFetch(table+"?id=eq."+row.id,{params:{limit:1}});
          if(ex.length>0)await apiFetch(table+"?id=eq."+row.id,{method:"PATCH",body:row});
          else await apiFetch(table,{method:"POST",body:row});
        }else{
          const{id,...r}=row;
          await apiFetch(table,{method:"POST",body:r});
        }
        ok++;
      }catch(e){err++;}
    }
    statusEl.textContent="✓ "+ok+" imported"+(err>0?" ("+err+" errors)":"");
    statusEl.style.color=err>0?"var(--yellow)":"var(--green)";
    // Reload affected data
    if(table==="vendors")state.vendors=await getAll("vendors");
    else if(table==="products")state.products=await getAll("products");
    else if(table==="commodities")state.commodities=await getAll("commodities");
    else if(table==="product_contacts")state.contacts=await getAll("product_contacts");
    else if(table==="geographic_coverage")state.geo=await getAll("geographic_coverage");
    else if(table==="product_commodities_coverage")state.pcc=await getAll("product_commodities_coverage");
    else if(table==="customer_type_coverage")state.ct=await getAll("customer_type_coverage");
    render();
  }catch(e){statusEl.textContent="Error: "+e.message;statusEl.style.color="var(--red)";}
}

  setTimeout(()=>{const e=document.getElementById("chat-messages");if(e)e.scrollTop=e.scrollHeight;},100);
}
function addMsg(role,text){
  const el=document.getElementById("chat-messages");if(!el)return;
  const d=document.createElement("div");
  d.style.cssText="margin-bottom:10px;display:flex;flex-direction:column;align-items:"+(role==="user"?"flex-end":"flex-start");
  const b=document.createElement("div");
  b.style.cssText="max-width:90%;padding:7px 11px;border-radius:10px;font-size:12px;line-height:1.6;white-space:pre-wrap;"+(role==="user"?"background:var(--accent);color:#fff;border-bottom-right-radius:3px":"background:var(--bg3);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:3px");
  b.textContent=text;d.appendChild(b);el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function addTableMsg(cols,rows){
  const el=document.getElementById("chat-messages");if(!el)return;
  const wrap=document.createElement("div");
  wrap.style.cssText="margin-bottom:10px;max-width:100%;overflow-x:auto";
  const tbl=document.createElement("table");
  tbl.style.cssText="width:100%;border-collapse:collapse;font-size:11px;background:var(--bg3);border-radius:6px;overflow:hidden";
  const thead=document.createElement("thead");
  const hr=document.createElement("tr");
  cols.forEach(c=>{const th=document.createElement("th");th.style.cssText="padding:5px 9px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap";th.textContent=c;hr.appendChild(th);});
  thead.appendChild(hr);tbl.appendChild(thead);
  const tbody=document.createElement("tbody");
  rows.forEach(row=>{const tr=document.createElement("tr");cols.forEach(c=>{const td=document.createElement("td");td.style.cssText="padding:4px 9px;border-bottom:1px solid var(--row-border);font-size:11px";td.textContent=row[c]??"";;tr.appendChild(td);});tbody.appendChild(tr);});
  tbl.appendChild(tbody);wrap.appendChild(tbl);
  const meta=document.createElement("div");meta.style.cssText="font-size:10px;color:var(--muted);margin-top:3px;padding-left:3px";
  meta.textContent=rows.length+" result"+(rows.length!==1?"s":"");
  wrap.appendChild(meta);el.appendChild(wrap);el.scrollTop=el.scrollHeight;
}

async function execQuery(sql){
  // Parse table name
  const tMatch=sql.match(/from\s+(\w+)/i);
  if(!tMatch)throw new Error("Could not parse table name");
  const table=tMatch[1].toLowerCase();
  // Build params from SQL
  const params={limit:50};
  // SELECT cols
  const selMatch=sql.match(/^select\s+(.+?)\s+from/i);
  if(selMatch&&selMatch[1].trim()!=="*"){
    const cols=selMatch[1].split(",").map(c=>c.trim().split(/\s+as\s+/i)[0].trim().replace(/.*\./,"").replace(/[()]/g,"")).filter(c=>!c.includes(" ")&&c!=="count");
    if(cols.length>0)params.select=cols.join(",");
  }
  // WHERE
  const whereMatch=sql.match(/where\s+(.+?)(?:\s+order|\s+limit|\s+group|$)/is);
  if(whereMatch){
    const w=whereMatch[1];
    const ilikeM=w.match(/(\w+)\s+ilike\s+'%([^']+)%'/i);
    const eqM=w.match(/(\w+)\s*=\s*'([^']+)'/i);
    const ilikeM2=w.match(/(\w+)\s+ilike\s+'([^']+)'/i);
    if(ilikeM)params[ilikeM[1]+".ilike"]="%" + ilikeM[2]+"%";
    else if(eqM)params[eqM[1]+".eq"]=eqM[2];
    else if(ilikeM2)params[ilikeM2[1]+".ilike"]=ilikeM2[2];
  }
  // ORDER
  const ordM=sql.match(/order\s+by\s+(\w+)(?:\s+(asc|desc))?/i);
  if(ordM)params.order=ordM[1]+(ordM[2]?.toLowerCase()==="desc"?".desc":"");
  // COUNT
  if(sql.toLowerCase().includes("count(*)")){
    const data=await apiFetch(table,{params:{...params,select:"id"}});
    return[{count:data.length}];
  }
  return await apiFetch(table,{params});
}

async function sendChat(){
  if(!GROQ_KEY){
    showGroqKeyModal();
    return;
  }
  const inp=document.getElementById("chat-input");
  const msg=inp.value.trim();if(!msg)return;
  inp.value="";
  addMsg("user",msg);
  chatHistory.push({role:"user",content:msg});
  const typing=document.createElement("div");
  typing.id="chat-typing";typing.style.cssText="margin-bottom:10px;color:var(--muted);font-size:11px;padding-left:4px";
  typing.textContent="Thinking...";
  document.getElementById("chat-messages").appendChild(typing);
  document.getElementById("chat-messages").scrollTop=99999;
  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
      body:JSON.stringify({model:GROQ_MODEL,messages:[{role:"system",content:SYSTEM_PROMPT},...chatHistory.slice(-6)],max_tokens:400,temperature:0.1})
    });
    const data=await res.json();
    if(!res.ok){document.getElementById("chat-typing")?.remove();addMsg("assistant","API Error: "+(data?.error?.message||JSON.stringify(data)));return;}
    const reply=(data.choices?.[0]?.message?.content||"").trim();
    document.getElementById("chat-typing")?.remove();
    if(reply.startsWith("SQL_QUERY:")){
      const sql=reply.replace("SQL_QUERY:","").trim();
      try{
        const results=await execQuery(sql);
        if(!results.length){addMsg("assistant","No results found.");}
        else{addTableMsg(Object.keys(results[0]),results);}
      }catch(e){addMsg("assistant","Query error: "+e.message);}
    }else if(reply.startsWith("ACTION:")){
      const aM=reply.match(/ACTION:(\w+):(\{.*\})/s);
      if(aM){
        try{
          const rec=JSON.parse(aM[2]);
          const tbl=aM[1]==="ADD_VENDOR"?"vendors":aM[1]==="ADD_PRODUCT"?"products":"product_contacts";
          await apiFetch(tbl,{method:"POST",body:rec});
          if(tbl==="vendors")state.vendors=await getAll("vendors");
          else if(tbl==="products")state.products=await getAll("products");
          else state.contacts=await getAll("product_contacts");
          addMsg("assistant","Record added successfully to "+tbl.replace(/_/g," ")+"!");render();
        }catch(e){addMsg("assistant","Error adding record: "+e.message);}
      }
    }else{addMsg("assistant",reply);}
    chatHistory.push({role:"assistant",content:reply});
  }catch(e){document.getElementById("chat-typing")?.remove();addMsg("assistant","Connection error: "+e.message);}
}
