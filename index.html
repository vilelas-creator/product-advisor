<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Advisor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--bg2:#0d1424;--bg3:#0a1020;--border:#1e2d40;--text:#e2e8f0;--muted:#64748b;
  --accent:#60a5fa;--green:#22c55e;--yellow:#f59e0b;--purple:#a78bfa;--red:#ef4444;
  --input-bg:#111827;--row-border:#111827;
}
.light{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#1d4ed8;--green:#16a34a;--yellow:#d97706;--purple:#7c3aed;--red:#dc2626;
  --input-bg:#ffffff;--row-border:#f1f5f9;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;transition:background .2s,color .2s;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;min-height:48px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.logo{font-weight:700;font-size:14px;color:var(--accent);white-space:nowrap;}
.sub{font-size:10px;color:var(--muted);margin-left:4px;}
nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap;padding:3px 0;max-width:calc(100% - 280px);}
.tab{padding:4px 10px;font-size:11px;border:none;border-radius:5px;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--accent);color:#fff;font-weight:600;}
.tab:hover:not(.active){background:var(--bg3);}
.theme-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit;white-space:nowrap;}
main{padding:12px;max-width:1600px;margin:0 auto;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.card-head{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg3);}
.card-title{font-weight:600;font-size:13px;}
.card-meta{font-size:11px;color:var(--muted);margin-left:auto;}
.filters{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--bg3);}
input,select{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;outline:none;}
input{width:180px;}
.btn{padding:4px 10px;font-size:11px;font-weight:600;border:none;border-radius:5px;cursor:pointer;font-family:inherit;background:var(--bg3);color:var(--muted);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:#14532d;color:#86efac;border:1px solid #22c55e44;}
.btn-reset{background:#1e3a1e;color:var(--green);border:1px solid var(--green);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:7px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:6px 12px;border-bottom:1px solid var(--row-border);color:var(--text);vertical-align:middle;}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.pager{display:flex;gap:8px;padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);align-items:center;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center;}
.stat-n{font-size:26px;font-weight:700;color:var(--accent);}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.bar-inner{height:100%;border-radius:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
a{color:var(--accent);text-decoration:none;cursor:pointer;}
a:hover{text-decoration:underline;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:22px;}
.fg{margin-bottom:11px;}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;}
.fg textarea{min-height:55px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;}
.section{display:none;}
.section.active{display:block;}
.loading{padding:28px;text-align:center;color:var(--muted);}
.row-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--row-border);}
.pct-cell{min-width:90px;}
.comment-block{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;font-size:11px;}
.comment-meta{color:var(--muted);font-size:10px;margin-bottom:3px;}
.comment-text{color:var(--text);line-height:1.5;}
@media(max-width:768px){.stat-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}nav{gap:1px;}.tab{padding:3px 6px;font-size:10px;}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="auth-screen" style="display:flex;position:fixed;inset:0;background:var(--bg);z-index:99999;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:36px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:32px;margin-bottom:8px">📊</div>
      <div style="font-weight:700;font-size:20px;color:var(--accent)">Product Advisor</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">CTRM & Risk Management Intelligence</div>
    </div>
    <div id="auth-tabs" style="display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <button id="tab-login" onclick="showAuthTab('login')" style="flex:1;padding:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--accent);color:#fff;font-family:inherit">Sign In</button>
      <button id="tab-register" onclick="showAuthTab('register')" style="flex:1;padding:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit">Register</button>
    </div>
    <div id="auth-login">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Email</label>
        <input id="login-email" type="email" placeholder="your@email.com" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <button onclick="doLogin()" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">Sign In</button>
      <div id="login-error" style="margin-top:12px;color:var(--red);font-size:12px;text-align:center;display:none"></div>
      <div style="text-align:center;margin-top:16px">
        <a onclick="showForgotPassword()" href="#" style="font-size:12px;color:var(--accent)">Forgot password?</a>
      </div>
    </div>
    <div id="auth-register" style="display:none">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Full Name</label>
        <input id="register-name" type="text" placeholder="Your full name" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Email</label>
        <input id="register-email" type="email" placeholder="your@email.com" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Password</label>
        <input id="register-password" type="password" placeholder="Min. 6 characters" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <button onclick="doRegister()" style="width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">Create Account</button>
      <div id="register-error" style="margin-top:12px;color:var(--red);font-size:12px;text-align:center;display:none"></div>
      <div id="register-success" style="margin-top:12px;color:var(--green);font-size:12px;text-align:center;display:none"></div>
    </div>
  </div>
</div>
<header style="display:none">
  <div><span class="logo">Product Advisor</span><span class="sub">CTRM &amp; Risk Management Intelligence</span></div>
  <nav id="nav"></nav>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
</header>
<main style="display:none">
  <div id="section-overview" class="section active"></div>
  <div id="section-vendors" class="section"></div>
  <div id="section-products" class="section"></div>
  <div id="section-commodities" class="section"></div>
  <div id="section-ctrm" class="section"></div>
  <div id="section-risk" class="section"></div>
  <div id="section-geo" class="section"></div>
  <div id="section-customertype" class="section"></div>
  <div id="section-contacts" class="section"></div>
  <div id="section-reporting" class="section"></div>
  <div id="section-import" class="section"></div>
  <div id="section-logs" class="section"></div>
</main>
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <strong id="modal-title" style="font-size:14px"></strong>
      <button class="btn" style="margin-left:auto" onclick="closeModal()">✕ Close</button>
    </div>
    <div id="modal-fields"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary" onclick="saveModal()">💾 Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script>
const SB_URL="https://hhltetlifatsskrfkywu.supabase.co";
const SB_KEY="sb_publishable_qT84fC6EBYcMndu0IW4log_ksZnx5cP";
const GROQ_MODEL="llama-3.3-70b-versatile";
const COV_COLOR={D:"#22c55e",C:"#f59e0b",N:"#ef4444",X:"#64748b"};
const COV_LABEL={D:"Deployed",C:"Capable",N:"Not Capable",X:"N/A"};
const getCode=l=>{if(!l)return"X";if(l.includes("deployed"))return"D";if(l.includes("capable"))return"C";if(l.includes("not currently"))return"N";return"X";};
let isDark=true;
let currentUser="User";

function toggleTheme(){isDark=!isDark;document.body.classList.toggle("light",!isDark);document.getElementById("theme-btn").textContent=isDark?"☀️ Light":"🌙 Dark";}

let state={vendors:[],products:[],contacts:[],ctrm:[],risk:[],geo:[],pcc:[],ct:[],commodities:[],pages:{},filters:{},ctrmLoading:true};
let modalSaveFn=null;

async function apiFetch(table,opts={}){
  const{method="GET",body,params={}}=opts;
  let url=SB_URL+"/rest/v1/"+table;
  const qp=new URLSearchParams(params);
  if([...qp].length)url+="?"+qp;
  const res=await fetch(url,{method,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
async function getAll(table){
  const all=[];let offset=0;
  while(true){const b=await apiFetch(table,{params:{limit:1000,offset,order:"id"}});all.push(...b);if(b.length<1000)break;offset+=1000;}
  return all;
}

function bdg(label,color){return`<span class="badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${label||""}</span>`;}
function bar(pct,color){return`<div class="bar-wrap"><div class="bar-inner" style="width:${Math.min(pct,100)}%;background:${color||"var(--accent)"}"></div></div>`;}
function escAttr(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;");}
function pagerHtml(id,page,total,per){
  const pages=Math.ceil(total/per);if(pages<=1)return"";
  return`<div class="pager"><button class="btn" onclick="changePage('${id}',${page-1})" ${page===0?"disabled":""}>← Prev</button><span>Page ${page+1} / ${pages} · ${total.toLocaleString()} records</span><button class="btn" onclick="changePage('${id}',${page+1})" ${page>=pages-1?"disabled":""}>Next →</button></div>`;
}
function changePage(id,p){state.pages[id]=Math.max(0,p);render();}

function navToProduct(name, type) {
  const decoded = decodeURIComponent(name.replace(/%27/g,"'"));
  if (type && type.includes('Risk')) {
    navToTab('risk', 'risk_prod', decoded);
  } else {
    navToTab('ctrm', 'ctrm_prod', decoded);
  }
}

function navToIntelligence(productName){
  state.activeReport = 'intelligence';
  state._intProd = productName;
  state._intSection = 'pcc';
  state._intFPccCom=''; state._intFPccCov='';
  state._intFCtrmFn=''; state._intFCtrmCom=''; state._intFCtrmCov='';
  state._intFRiskCat=''; state._intFRiskFn=''; state._intFRiskCov='';
  setTab('reporting');
}
function navToTab(tab,filterKey,filterVal){if(filterKey)state.filters[filterKey]=filterVal;state.pages={};setTab(tab);}
function sf(key,val){
  state.filters[key]=val;state.pages={};
  const aid=document.activeElement?.id;
  const ss=document.activeElement?.selectionStart;
  const se=document.activeElement?.selectionEnd;
  render();
  if(aid){const el=document.getElementById(aid);if(el){el.focus();try{el.setSelectionRange(ss,se);}catch(e){}}}
}
function resetFilters(prefix){Object.keys(state.filters).forEach(k=>{if(k.startsWith(prefix))delete state.filters[k];});state.pages={};render();}
function resetBtn(prefix){return`<button class="btn btn-reset" onclick="resetFilters('${prefix}')">↺ Reset</button>`;}
function selOpts(options,current,allLabel="All"){return`<option value="">${allLabel}</option>`+options.map(o=>`<option ${o===current?"selected":""}>${o}</option>`).join("");}

// ── COMMENTS ──
function renderComments(comments){
  if(!comments||!comments.length)return'<div style="color:var(--muted);font-size:11px;padding:4px 0">No comments yet</div>';
  return comments.map(c=>`<div class="comment-block"><div class="comment-meta">👤 ${c.user} &nbsp;·&nbsp; ${c.date}</div><div class="comment-text">${c.text}</div></div>`).join("");
}
function addComment(table,id,currentComments){
  const text=prompt("Add comment:");
  if(!text||!text.trim())return;
  const now=new Date();
  const dateStr=now.toLocaleDateString("en-GB")+", "+now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const newComment={user:currentUser,date:dateStr,text:text.trim()};
  const updated=[...(currentComments||[]),newComment];
  apiFetch(table+"?id=eq."+id,{method:"PATCH",body:{capspire_comments:JSON.stringify(updated)}})
    .then(()=>{
      if(table==="vendors")state.vendors=state.vendors.map(v=>v.id===id?{...v,capspire_comments:JSON.stringify(updated)}:v);
      else if(table==="products")state.products=state.products.map(p=>p.id===id?{...p,capspire_comments:JSON.stringify(updated)}:p);
      else if(table==="commodities")state.commodities=state.commodities.map(c=>c.id===id?{...c,capspire_comments:JSON.stringify(updated)}:c);
      render();
    }).catch(e=>alert("Error saving comment: "+e.message));
}
function parseComments(v){try{return v?JSON.parse(v):[];}catch{return[];}}
function commentCell(table,row){
  const comments=parseComments(row.capspire_comments);
  const count=comments.length;
  return`<td style="min-width:200px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted)">${count?count+" comment"+(count>1?"s":""):"No comments"}</span><button class="btn" style="font-size:10px;padding:2px 7px" onclick="showComments('${table}',${row.id})">💬 View</button><button class="btn btn-primary" style="font-size:10px;padding:2px 7px" onclick="addComment('${table}',${row.id},parseComments(${JSON.stringify(row.capspire_comments||"[]")}))">+ Add</button></div></td>`;
}
function showComments(table,id){
  const row=state[table==="vendors"?"vendors":table==="products"?"products":"commodities"].find(r=>r.id===id);
  const comments=parseComments(row?.capspire_comments);
  const d=document.createElement("div");
  d.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
  d.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px"><div style="display:flex;align-items:center;margin-bottom:14px"><strong>capSpire Comments</strong><button onclick="this.closest('div[style]').remove()" style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button></div>${renderComments(comments)}<button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="this.closest('div[style]').remove();addComment('${table}',${id},${JSON.stringify(comments)})">+ Add Comment</button></div>`;
  document.body.appendChild(d);
}

// ── TABS ──

// ── USER IDENTITY ──
function getUsername(){return localStorage.getItem("pa_username")||"";}
function ensureUsername(callback){
  const user=getUsername();if(user){callback(user);return;}
  const ov=document.createElement("div");ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px";
  const bx=document.createElement("div");bx.style.cssText="background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:400px;padding:28px;text-align:center";
  bx.innerHTML="<div style='font-size:28px;margin-bottom:12px'>&#128100;</div><div style='font-weight:700;font-size:16px;margin-bottom:6px'>Welcome to Product Advisor</div><div style='color:var(--muted);font-size:12px;margin-bottom:20px'>Please enter your name to continue.</div>";
  const inp=document.createElement("input");inp.id="uname-inp";inp.placeholder="Your full name...";
  inp.style.cssText="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;box-sizing:border-box";
  const btn=document.createElement("button");btn.textContent="Continue →";
  btn.style.cssText="width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600";
  box: { bx.appendChild(inp);bx.appendChild(btn);ov.appendChild(bx);document.body.appendChild(ov);setTimeout(()=>inp.focus(),100); }
  const save=()=>{const name=inp.value.trim();if(!name){inp.style.border="1px solid var(--red)";return;}localStorage.setItem("pa_username",name);ov.remove();callback(name);};
  btn.onclick=save;inp.onkeydown=e=>{if(e.key==="Enter")save();};
}

// ── COMMENTS ──
function parseComments(v){try{return v?JSON.parse(v):[];}catch{return[];}}
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function saveCommentsToState(table,id,updated){
  const str=JSON.stringify(updated);
  if(table==="vendors")state.vendors=state.vendors.map(v=>v.id===id?{...v,capspire_comments:str}:v);
  else if(table==="products")state.products=state.products.map(p=>p.id===id?{...p,capspire_comments:str}:p);
  else if(table==="commodities")state.commodities=state.commodities.map(c=>c.id===id?{...c,capspire_comments:str}:c);
}
let cmtTable="",cmtId=null,cmtList=[];
function renderComments(comments){
  if(!comments||!comments.length)return "<div style='color:var(--muted);font-size:11px;padding:4px 0'>No comments yet</div>";
  return comments.map((c,i)=>
    "<div class='comment-block'><div style='display:flex;align-items:center;gap:6px;margin-bottom:4px'>" +
    "<span class='comment-meta'>&#128100; "+escH(c.user)+" &nbsp;&middot;&nbsp; "+escH(c.date)+"</span>" +

function renderReportHeatmap(el,backBtn,report){
  const pcc=state.pcc||[];
  const products=[...new Set(pcc.map(r=>r.product))].filter(Boolean).sort();
  const COL_ORDER=["Power","Natural Gas","HC Liquids","PetroChem / Chemicals","Coal","LNG","Bulk","Break Bulk","Container","Base Metals","Ferrous","Concentrates","Precious Metals","North America CO2 & Emissions","Europe CO2 & Emissions","FX"];
  const allComs=[...new Set(pcc.map(r=>r.commodity))].filter(Boolean);
  const normCom=s=>(s||"").trim().toLowerCase();
  const orderedComs=[]; const usedNorm=new Set();
  COL_ORDER.forEach(col=>{const match=allComs.find(c=>normCom(c)===normCom(col));if(match&&!usedNorm.has(normCom(match))){orderedComs.push(match);usedNorm.add(normCom(match));}});
  allComs.sort().forEach(c=>{if(!usedNorm.has(normCom(c))){orderedComs.push(c);usedNorm.add(normCom(c));}});
  const map={}; pcc.forEach(r=>{map[r.product+"||"+r.commodity]=r.coverage_level;});
  // Build feedback map: product+commodity -> array of feedback entries
  const fbMap={};
  (state.clients||[]).forEach(c=>{

function renderReportMarket(el,backBtn,report){
  const pcc=state.pcc||[]; const products=state.products||[]; const clients=state.clients||[];

  // Build FB commodity map
  const fbComMap={};
  clients.forEach(c=>{
    const blocks=[];
    try{ if(c.pcc_blocks) blocks.push(...JSON.parse(c.pcc_blocks));}catch(e){}
    if(!blocks.length && c.commodities){ c.commodities.split(",").forEach(com=>{ if(com.trim()) blocks.push({commodity:com.trim(),coverage_level:c.coverage_level,client_name:c.client_name||c.vendor_name}); }); }
    blocks.forEach(b=>{ if(!fbComMap[b.commodity]) fbComMap[b.commodity]=[]; fbComMap[b.commodity].push({client:c.client_name||c.vendor_name,coverage:b.coverage_level,product:c.product}); });
  });
  const data=commodities.map(c=>{
    const entries=pcc.filter(r=>r.commodity===c);
    const covered=entries.filter(r=>r.coverage_level==="Covered").length;
    const partial=entries.filter(r=>r.coverage_level&&r.coverage_level.includes("Partial")).length;

    const riskCount=prods.filter(p=>{const pr=products.find(x=>x.product_name===p);return(pr?.product_type||"").toLowerCase().includes("risk");}).length;
    const vendors=[...new Set(entries.map(r=>{const pr=products.find(p=>p.product_name===r.product);return pr?.vendor;}).filter(Boolean))];
    const fbEntries=fbComMap[c]||[];

    const card=document.createElement("div"); card.style.cssText="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .15s";
    card.onmouseover=()=>card.style.boxShadow="0 4px 20px rgba(0,0,0,.3)"; card.onmouseout=()=>card.style.boxShadow="";
    card.innerHTML=`<div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><a href="#" onclick="navToPccByCommodity('${escAttr(c)}');return false;" style="font-weight:700;font-size:14px;color:var(--text);text-decoration:none">${c}</a><div style="text-align:right;flex-shrink:0"><div style="font-size:22px;font-weight:700;color:${covPct>70?"var(--green)":covPct>40?"var(--yellow)":"var(--red)"}">${covPct}%</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Covered</div></div></div><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">${ctrmCount?`<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44">⚡ CTRM: ${ctrmCount}</span>`:""}${riskCount?`<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--purple)22;color:var(--purple);border:1px solid var(--purple)44">🛡 Risk: ${riskCount}</span>`:""}</div></div>
    <div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">
      <div><div style="display:flex;height:7px;border-radius:4px;overflow:hidden;gap:1px;margin-bottom:5px">${barCov?`<div style="flex:${barCov};background:var(--green)"></div>`:""}${barPartial?`<div style="flex:${barPartial};background:var(--yellow)"></div>`:""}${barNot?`<div style="flex:${barNot};background:var(--red)"></div>`:""}${!total?`<div style="flex:1;background:var(--border)"></div>`:""}</div><div style="display:flex;gap:10px;flex-wrap:wrap"><span style="font-size:10px;color:var(--green)">● Covered: ${covered}</span><span style="font-size:10px;color:var(--yellow)">● Partial: ${partial}</span><span style="font-size:10px;color:var(--red)">● Not Covered: ${notCov}</span></div></div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;text-align:center"><div style="background:var(--bg3);border-radius:6px;padding:7px 4px"><div style="font-size:16px;font-weight:700;color:var(--accent)">${total}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Products</div></div><div style="background:var(--bg3);border-radius:6px;padding:7px 4px"><div style="font-size:16px;font-weight:700;color:var(--purple)">${vendors.length}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Vendors</div></div></div>
      ${vendors.length?`<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Vendors</div><div style="display:flex;flex-wrap:wrap;gap:4px">${vendorsVisible} ${vendorsMore}</div>${vendorsHiddenHtml}</div>`:""}
      ${fbHtml}
    </div>`;
    grid.appendChild(card);
  });
  wrap.appendChild(grid); el.appendChild(wrap);
}

function renderIntelligenceDetail(el, backBtn, report, productName){
  const prod=(state.products||[]).find(p=>p.product_name===productName)||{product_name:productName};
  const pcc=(state.pcc||[]).filter(r=>r.product===productName);
  const ctrm=(state.ctrm||[]).filter(r=>r.product===productName);
  const risk=(state.risk||[]).filter(r=>r.product===productName);
  const clients=(state.clients||[]).filter(c=>c.product===productName);
  const vendorClients=(state.clients||[]).filter(c=>c.vendor_name&&(c.vendor_name||"").toLowerCase()===((prod.vendor||"").toLowerCase()));
  const activeSection=state._intSection||"pcc";
  const fPccCom=state._intFPccCom||""; const fPccCov=state._intFPccCov||"";
  const fCtrmFn=state._intFCtrmFn||""; const fCtrmCom=state._intFCtrmCom||""; const fCtrmCov=state._intFCtrmCov||"";
  const fRiskCat=state._intFRiskCat||""; const fRiskFn=state._intFRiskFn||""; const fRiskCov=state._intFRiskCov||"";
  const covPct=pcc.length?Math.round(pcc.filter(r=>r.coverage_level==="Covered").length/pcc.length*100):null;
  const isRiskOnly=risk.length>0&&ctrm.length===0;
  const isCtrmOnly=ctrm.length>0&&risk.length===0;

  el.innerHTML="";
  const wrap=document.createElement("div"); wrap.style.cssText="padding:16px";

  const covColor=lv=>lv==="Covered"||lv==="Deployed"?"var(--green)":lv&&(lv.includes("Partial")||lv==="Capable")?"var(--yellow)":"var(--red)";

  function fbInlineRow(f, type){
    let detail="";
    let blocks=[];
    try{ if(type==='pcc'&&f.pcc_blocks) blocks=JSON.parse(f.pcc_blocks);}catch(e){}
    try{ if(type==='ctrm'&&f.ctrm_blocks) blocks=JSON.parse(f.ctrm_blocks);}catch(e){}
    try{ if(type==='risk'&&f.risk_blocks) blocks=JSON.parse(f.risk_blocks);}catch(e){}
    if(blocks.length){
      detail=blocks.map(b=>`<span style="font-size:10px;padding:1px 6px;background:var(--bg);border-radius:4px;margin-right:3px">${b.commodity||b.category||''} ${b.function_name?'· '+b.function_name:''} ${b.coverage_level?'<span style="color:'+covColor(b.coverage_level)+'">● '+b.coverage_level+'</span>':''} ${b.notes?'<em style="color:var(--muted)">'+b.notes+'</em>':''}</span>`).join('');
    } else {
      detail=(f.coverage_level?`<span style="color:${covColor(f.coverage_level)};font-size:10px">● ${f.coverage_level}</span> `:"")+
             (f.commodities?`<span style="font-size:10px;color:var(--accent)">${f.commodities}</span> `:"")+
             (f.notes?`<em style="font-size:10px;color:var(--muted)">${f.notes}</em>`:"");
    }
    return `<div style="background:var(--bg3);border-left:3px solid var(--accent);padding:5px 10px;font-size:11px;margin:2px 0 2px 20px;border-radius:0 4px 4px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <strong>${f.client_name}</strong>
      ${f.region?`<span style="color:var(--muted)">📍${f.region}</span>`:""}
      ${f.since_year?`<span style="color:var(--muted)">📅${f.since_year}</span>`:""}
      ${detail}
    </div>`;
  }

  // Product header
  const hdr=document.createElement("div");
  // Vendor feedback section
  const vFbCount=vendorClients.length;
  const vFbHtml=vFbCount?`<div style="margin-top:10px">
    <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="cursor:pointer;font-size:11px;color:var(--accent);font-weight:600;user-select:none">💬 capSpire Vendor Feedback (${vFbCount}) ▾</div>
    <div style="display:none;margin-top:6px">${vendorClients.map(f=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:5px;font-size:11px"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><strong>${f.client_name}</strong>${f.project_name?`<span style="color:var(--muted)">📁${f.project_name}</span>`:""}${f.region?`<span style="color:var(--muted)">📍${f.region}</span>`:""}${f.since_year?`<span style="color:var(--muted)">📅${f.since_year}</span>`:""}</div>${f.notes?`<div style="color:var(--muted);margin-top:3px;font-style:italic">${f.notes}</div>`:""}</div>`).join("")}
    </div>
  </div>`:"";

  hdr.innerHTML=`
    <button onclick="state._intProd=null;state._intSection=null;renderReporting()" class="btn" style="margin-bottom:12px;display:inline-flex;align-items:center;gap:5px">&#8592; Back to Products</button>
    <div class="card" style="margin-bottom:14px">
      <div style="padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;color:var(--text)">
            <a href="#" onclick="navToTab('products','p_q','${escAttr(productName)}');return false;" style="color:var(--accent)">${productName}</a>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">${prod.vendor||""} ${prod.product_type?"&#183; "+bdg(prod.product_type.includes("Risk")?"Risk":"CTRM",prod.product_type.includes("Risk")?"var(--purple)":"var(--accent)"):""}</div>
          ${prod.deployment_model?`<div style="font-size:11px;color:var(--muted);margin-top:4px">Deployment: ${prod.deployment_model}</div>`:""}
          ${prod.version_info?`<div style="font-size:11px;color:var(--yellow);margin-top:2px">Version: ${prod.version_info}</div>`:""}
          ${vFbHtml}
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start">
          ${covPct!==null?`<div style="text-align:center"><div style="font-size:22px;font-weight:700;color:${covPct>70?"var(--green)":covPct>40?"var(--yellow)":"var(--red)"}">${covPct}%</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Coverage</div></div>`:""}
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--accent)">${clients.length}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Feedbacks</div></div>
          <button class="btn btn-success" style="font-size:11px;padding:5px 12px" onclick="exportProductIntelligenceExcel('${escAttr(productName)}')">⬇ Export</button>
        </div>
      </div>
    </div>`;
  wrap.appendChild(hdr);

  // Section tabs
  const tabsDiv=document.createElement("div"); tabsDiv.style.cssText="display:flex;gap:4px;margin-bottom:14px";
  [["pcc","🌾 Commodity"],["ctrm","⚡ CTRM"],["risk","🛡 Risk"]].forEach(([id,label])=>{
    const btn=document.createElement("button");
    btn.className="tab"+(activeSection===id?" active":"");
    btn.textContent=label;
    btn.onclick=()=>{state._intSection=id;renderReporting();};
    tabsDiv.appendChild(btn);
  });
  wrap.appendChild(tabsDiv);

  const content=document.createElement("div");

  if(activeSection==="pcc"){
    const coms=[...new Set(pcc.map(r=>r.commodity).filter(Boolean))].sort();
    const covs=[...new Set(pcc.map(r=>r.coverage_level).filter(Boolean))].sort();
    let rows=pcc.filter(r=>(!fPccCom||r.commodity===fPccCom)&&(!fPccCov||r.coverage_level===fPccCov));
    const filtersHtml=`<div class="filters" style="border-radius:8px;margin-bottom:10px">
      <select onchange="state._intFPccCom=this.value;renderReporting()" style="font-size:12px"><option value="">All Commodities</option>${coms.map(c=>`<option value="${c}" ${c===fPccCom?"selected":""}>${c}</option>`).join("")}</select>
      <select onchange="state._intFPccCov=this.value;renderReporting()" style="font-size:12px"><option value="">All Coverage</option>${covs.map(c=>`<option value="${c}" ${c===fPccCov?"selected":""}>${c}</option>`).join("")}</select>
      <button class="btn btn-reset" onclick="state._intFPccCom='';state._intFPccCov='';renderReporting()">&#8635; Reset</button>
      <span style="font-size:11px;color:var(--muted);margin-left:auto">${rows.length} rows</span>
    </div>`;
    let html=filtersHtml+'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Commodity</th><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Official Coverage</th><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left"></th></tr></thead><tbody>';
    rows.forEach(r=>{
      const cColor=r.coverage_level==="Covered"?"var(--green)":r.coverage_level?.includes("Partial")?"var(--yellow)":"var(--red)";
      // Find feedback for this commodity
      const fbForRow=clients.filter(c=>{
        if(c.source_table==='pcc'){
          let blocks=[];
          try{if(c.pcc_blocks)blocks=JSON.parse(c.pcc_blocks);}catch(e){}
          if(blocks.length) return blocks.some(b=>b.commodity===r.commodity);
          return c.commodities&&c.commodities.includes(r.commodity);
        }
        if(c.source_table==='products') return c.commodities&&c.commodities.includes(r.commodity);
        return false;
      });
      const rowId="pcc-row-"+r.id;
      html+=`<tr style="border-bottom:1px solid var(--row-border)"><td style="padding:8px 12px;font-weight:600">${r.commodity}</td><td style="padding:8px 12px"><span style="color:${cColor};font-weight:600">${r.coverage_level}</span></td><td style="padding:8px 12px">${fbForRow.length?`<button onclick="document.getElementById('${rowId}').style.display=document.getElementById('${rowId}').style.display==='none'?'table-row':'none'" style="font-size:10px;padding:2px 8px;background:var(--accent)22;border:1px solid var(--accent)44;color:var(--accent);border-radius:4px;cursor:pointer">💬 ${fbForRow.length} FB</button>`:""}</td></tr>`;
      if(fbForRow.length){
        html+=`<tr id="${rowId}" style="display:none;background:var(--bg3)"><td colspan="3" style="padding:4px 12px 8px 12px">${fbForRow.map(f=>fbInlineRow(f,'pcc')).join('')}</td></tr>`;
      }
    });
    html+="</tbody></table></div>";
    content.innerHTML=html;

  } else if(activeSection==="ctrm"){
    const fns=[...new Set(ctrm.map(r=>r.function_name).filter(Boolean))].sort();
    const coms=[...new Set(ctrm.map(r=>r.commodity).filter(Boolean))].sort();
    const covs=["Deployed","Capable","Not Capable","N/A"];
    let rows=ctrm.filter(r=>{
      if(fCtrmFn&&r.function_name!==fCtrmFn) return false;
      if(fCtrmCom&&r.commodity!==fCtrmCom) return false;
      if(fCtrmCov&&COV_LABEL[getCode(r.coverage_level)]!==fCtrmCov) return false;
      return true;
    });
    const filtersHtml=`<div class="filters" style="border-radius:8px;margin-bottom:10px">
      <select onchange="state._intFCtrmFn=this.value;renderReporting()" style="font-size:12px"><option value="">All Functions</option>${fns.map(f=>`<option value="${f}" ${f===fCtrmFn?"selected":""}>${f}</option>`).join("")}</select>
      <select onchange="state._intFCtrmCom=this.value;renderReporting()" style="font-size:12px"><option value="">All Commodities</option>${coms.map(c=>`<option value="${c}" ${c===fCtrmCom?"selected":""}>${c}</option>`).join("")}</select>
      <select onchange="state._intFCtrmCov=this.value;renderReporting()" style="font-size:12px"><option value="">All Coverage</option>${covs.map(c=>`<option value="${c}" ${c===fCtrmCov?"selected":""}>${c}</option>`).join("")}</select>
      <button class="btn btn-reset" onclick="state._intFCtrmFn='';state._intFCtrmCom='';state._intFCtrmCov='';renderReporting()">&#8635; Reset</button>
      <span style="font-size:11px;color:var(--muted);margin-left:auto">${rows.length} rows</span>
    </div>`;
    const fbCtrmClients=clients.filter(c=>c.source_table==='ctrm');
    let html=filtersHtml;
    if(isRiskOnly){
      html+=`<div style="padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;margin-bottom:12px">ℹ️ This product has no official CTRM data. capSpire feedback below.</div>`;
    } else {
      html+='<div style="overflow-x:auto;margin-bottom:16px"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Function</th><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Commodity</th><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Official Coverage</th><th></th></tr></thead><tbody>';
      rows.forEach(r=>{
        const code=getCode(r.coverage_level);
        const fbForRow=fbCtrmClients.filter(c=>{
          let blocks=[];
          try{if(c.ctrm_blocks)blocks=JSON.parse(c.ctrm_blocks);}catch(e){}
          if(blocks.length) return blocks.some(b=>b.function_name===r.function_name&&(!b.commodity||b.commodity===r.commodity));
          return c.function_name===r.function_name&&(!c.commodities||c.commodities.includes(r.commodity));
        });
        const rowId="ctrm-row-"+r.id;
        html+=`<tr style="border-bottom:1px solid var(--row-border)"><td style="padding:8px 12px;font-weight:600">${r.function_name}</td><td style="padding:8px 12px">${bdg(r.commodity,"var(--accent)")}</td><td style="padding:8px 12px">${bdg(COV_LABEL[code],COV_COLOR[code])}</td><td style="padding:8px 12px">${fbForRow.length?`<button onclick="document.getElementById('${rowId}').style.display=document.getElementById('${rowId}').style.display==='none'?'table-row':'none'" style="font-size:10px;padding:2px 8px;background:var(--accent)22;border:1px solid var(--accent)44;color:var(--accent);border-radius:4px;cursor:pointer">💬 ${fbForRow.length} FB</button>`:""}</td></tr>`;
        if(fbForRow.length){
          html+=`<tr id="${rowId}" style="display:none;background:var(--bg3)"><td colspan="4" style="padding:4px 12px 8px 12px">${fbForRow.map(f=>fbInlineRow(f,'ctrm')).join('')}</td></tr>`;
        }
      });
      html+="</tbody></table></div>";
    }
    if(fbCtrmClients.length&&isRiskOnly){
      html+=fbCtrmClients.map(f=>fbInlineRow(f,'ctrm')).join('');
    } else if(fbCtrmClients.length&&rows.length===0){
      html+=`<div style="font-size:11px;color:var(--muted);padding:8px;margin-bottom:8px">capSpire feedback (no official data rows match filters):</div>`;
      html+=fbCtrmClients.map(f=>fbInlineRow(f,'ctrm')).join('');
    }
    content.innerHTML=html;

  } else if(activeSection==="risk"){
    const cats=[...new Set(risk.map(r=>r.category).filter(Boolean))].sort();
    const fns=[...new Set(risk.map(r=>r.function_name).filter(Boolean))].sort();
    const covs=["Deployed","Capable","Not Capable","N/A"];
    let rows=risk.filter(r=>{
      if(fRiskCat&&r.category!==fRiskCat) return false;
      if(fRiskFn&&r.function_name!==fRiskFn) return false;
      if(fRiskCov&&COV_LABEL[getCode(r.coverage_level)]!==fRiskCov) return false;
      return true;
    });
    const filtersHtml=`<div class="filters" style="border-radius:8px;margin-bottom:10px">
      <select onchange="state._intFRiskCat=this.value;renderReporting()" style="font-size:12px"><option value="">All Categories</option>${cats.map(c=>`<option value="${c}" ${c===fRiskCat?"selected":""}>${c}</option>`).join("")}</select>
      <select onchange="state._intFRiskFn=this.value;renderReporting()" style="font-size:12px"><option value="">All Functions</option>${fns.map(f=>`<option value="${f}" ${f===fRiskFn?"selected":""}>${f}</option>`).join("")}</select>
      <select onchange="state._intFRiskCov=this.value;renderReporting()" style="font-size:12px"><option value="">All Coverage</option>${covs.map(c=>`<option value="${c}" ${c===fRiskCov?"selected":""}>${c}</option>`).join("")}</select>
      <button class="btn btn-reset" onclick="state._intFRiskCat='';state._intFRiskFn='';state._intFRiskCov='';renderReporting()">&#8635; Reset</button>
      <span style="font-size:11px;color:var(--muted);margin-left:auto">${rows.length} rows</span>
    </div>`;
    const fbRiskClients=clients.filter(c=>c.source_table==='risk');
    let html=filtersHtml;
    if(isCtrmOnly){
      html+=`<div style="padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;margin-bottom:12px">ℹ️ This product has no official Risk data. capSpire feedback below.</div>`;
    } else {
      html+='<div style="overflow-x:auto;margin-bottom:16px"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Category</th><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Function</th><th style="padding:7px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);text-transform:uppercase;text-align:left">Official Coverage</th><th></th></tr></thead><tbody>';
      rows.forEach(r=>{
        const code=getCode(r.coverage_level);
        const fbForRow=fbRiskClients.filter(c=>{
          let blocks=[];
          try{if(c.risk_blocks)blocks=JSON.parse(c.risk_blocks);}catch(e){}
          if(blocks.length) return blocks.some(b=>b.function_name===r.function_name&&(!b.category||b.category===r.category));
          return c.function_name===r.function_name&&(!c.category||c.category===r.category);
        });
        const rowId="risk-row-"+r.id;
        html+=`<tr style="border-bottom:1px solid var(--row-border)"><td style="padding:8px 12px">${bdg(r.category,"var(--purple)")}</td><td style="padding:8px 12px;font-weight:600">${r.function_name}</td><td style="padding:8px 12px">${bdg(COV_LABEL[code],COV_COLOR[code])}</td><td style="padding:8px 12px">${fbForRow.length?`<button onclick="document.getElementById('${rowId}').style.display=document.getElementById('${rowId}').style.display==='none'?'table-row':'none'" style="font-size:10px;padding:2px 8px;background:var(--accent)22;border:1px solid var(--accent)44;color:var(--accent);border-radius:4px;cursor:pointer">💬 ${fbForRow.length} FB</button>`:""}</td></tr>`;
        if(fbForRow.length){
          html+=`<tr id="${rowId}" style="display:none;background:var(--bg3)"><td colspan="4" style="padding:4px 12px 8px 12px">${fbForRow.map(f=>fbInlineRow(f,'risk')).join('')}</td></tr>`;
        }
      });
      html+="</tbody></table></div>";
    }
    if(fbRiskClients.length&&isCtrmOnly){
      html+=fbRiskClients.map(f=>fbInlineRow(f,'risk')).join('');
    }
    content.innerHTML=html;
  }

  wrap.appendChild(content);
  el.appendChild(wrap);
}

        let blocks=[]; try{if(c.ctrm_blocks)blocks=JSON.parse(c.ctrm_blocks);}catch(e){}

      });
      if(!fbs.length) ctrmData.push([r.function_name,r.commodity||"",r.coverage_level,"","",""]);
      else fbs.forEach(f=>{
        let blocks=[]; try{if(f.ctrm_blocks)blocks=JSON.parse(f.ctrm_blocks);}catch(e){}
        const blk=blocks.find(b=>b.function_name===r.function_name)||{};
        ctrmData.push([r.function_name,r.commodity||"",r.coverage_level,f.client_name,blk.coverage_level||f.coverage_level||"",blk.notes||f.notes||""]);
      });
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ctrmData),"CTRM Coverage");
  }
  // Sheet 5: Risk Coverage
  if(risk.length){
    const riskFbClients=clients.filter(c=>c.source_table==='risk');
    const riskData=[["Category","Function","Official Coverage","FB Client","FB Coverage","FB Notes"]];
    risk.forEach(r=>{
      const fbs=riskFbClients.filter(c=>{
        let blocks=[]; try{if(c.risk_blocks)blocks=JSON.parse(c.risk_blocks);}catch(e){}
        if(blocks.length) return blocks.some(b=>b.function_name===r.function_name&&(!b.category||b.category===r.category));
        return c.function_name===r.function_name;
      });
      if(!fbs.length) riskData.push([r.category||"",r.function_name,r.coverage_level,"","",""]);
      else fbs.forEach(f=>{
        let blocks=[]; try{if(f.risk_blocks)blocks=JSON.parse(f.risk_blocks);}catch(e){}
        const blk=blocks.find(b=>b.function_name===r.function_name)||{};
        riskData.push([r.category||"",r.function_name,r.coverage_level,f.client_name,blk.coverage_level||f.coverage_level||"",blk.notes||f.notes||""]);
      });
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(riskData),"Risk Coverage");
  }
  // Sheet 6: All capSpire Feedback
  if(clients.length){
    const allFbData=[["Client","Project","Type","Commodity/Category","Function","Coverage","Region","Since Year","Notes","Created By"],...clients.map(c=>[c.client_name,c.project_name||"",c.source_table||"",c.commodities||c.category||"",c.function_name||"",c.coverage_level||"",c.region||"",c.since_year||"",c.notes||"",c.created_by||""])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(allFbData),"All Feedback");
  }
  XLSX.writeFile(wb,"product_intelligence_"+productName.replace(/[^a-z0-9]/gi,"_")+".xlsx");
}

async function parseFileToRows(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{defval:null,raw:false});
        const rows=raw.map(r=>{
          const obj={};
          Object.entries(r).forEach(([k,v])=>{
            const key=String(k).trim();
            const val=(v===null||v==="")?null:(!isNaN(v)&&v!=="")?Number(v):String(v).trim();
            if(val!==null&&val!=="")obj[key]=val;
          });
          return obj;
        }).filter(r=>Object.keys(r).length>0);
        resolve(rows);
      }catch(e){reject(e);}
    };
    reader.onerror=()=>reject(new Error("Could not read file"));
    reader.readAsArrayBuffer(file);
  });
}

async function importFile(event,table){
  const file=event.target.files[0];if(!file)return;
  const statusEl=document.getElementById("import-status-"+table);
  const ext=file.name.split(".").pop().toLowerCase();if(!["xlsx","xls","csv"].includes(ext)){statusEl.textContent="Please upload Excel or CSV";statusEl.style.color="var(--red)";return;}
  statusEl.textContent="Reading file...";statusEl.style.color="var(--yellow)";
  try{
    const text=await file.text();
    const lines=text.split("\n").filter(l=>l.trim());
    if(lines.length<2){statusEl.textContent="File is empty!";statusEl.style.color="var(--red)";return;}
    const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
    rows=lines.slice(1).map(line=>{
      const vals=line.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
      const obj={};
      headers.forEach((h,i)=>{const v=vals[i]||"";obj[h]=v===""?null:isNaN(v)||v===""?v:Number(v);});
      return obj;
    }).filter(r=>Object.values(r).some(v=>v!==null&&v!==""));
    statusEl.textContent="Importing "+rows.length+" records...";
    let ok=0,err=0;
    for(const row of rows){
      try{
        if(row.id){
          const ex=await apiFetch(table+"?id=eq."+row.id,{params:{limit:1}});
          if(ex.length>0)await apiFetch(table+"?id=eq."+row.id,{method:"PATCH",body:row});
          else await apiFetch(table,{method:"POST",body:row});
        }else{
          const{id,...r}=row;
          await apiFetch(table,{method:"POST",body:r});
        }
        ok++;
      }catch(e){err++;}
    }
    statusEl.textContent="✓ "+ok+" imported"+(err>0?" ("+err+" errors)":"");
    statusEl.style.color=err>0?"var(--yellow)":"var(--green)";
    // Reload affected data
    if(table==="vendors")state.vendors=await getAll("vendors");
    else if(table==="products")state.products=await getAll("products");
    else if(table==="commodities")state.commodities=await getAll("commodities");
    else if(table==="product_contacts")state.contacts=await getAll("product_contacts");
    else if(table==="geographic_coverage")state.geo=await getAll("geographic_coverage");
    else if(table==="product_commodities_coverage")state.pcc=await getAll("product_commodities_coverage");
    else if(table==="customer_type_coverage")state.ct=await getAll("customer_type_coverage");
    render();
  }catch(e){statusEl.textContent="Error: "+e.message;statusEl.style.color="var(--red)";}
}

// ── ALL RISK FUNCTIONS from state.risk ──
function getRiskFnsByCategory(cat){
  return [...new Set((state.risk||[]).filter(r=>!cat||r.category===cat).map(r=>r.function_name).filter(Boolean))].sort();
}

function cfSetType(type){
  window._cfType = type;
  const productName = window._cfProductName;
  const existing = window._cfExisting;
  const ctx = window._cfCtx;

  ['products','pcc','ctrm','risk'].forEach(t=>{
    const b=document.getElementById('cftype-'+t);
    if(b){b.style.background=t===type?'var(--accent)':'var(--bg3)';b.style.color=t===type?'#fff':'var(--muted)';}
  });

  // Show/hide project and sharepoint
  const projWrap = document.getElementById('cf-project-wrap');
  const spWrap = document.getElementById('cf-sharepoint-wrap');
  const notesWrap = document.getElementById('cf-notes-wrap');
  if(projWrap) projWrap.style.display = (type==='products') ? 'block' : 'none';
  if(spWrap) spWrap.style.display = (type==='products') ? 'block' : 'none';
  if(notesWrap) notesWrap.style.display = (type==='products'||type==='vendor') ? 'block' : 'none';

  const container=document.getElementById('cf-dynamic-fields');
  if(!container) return;

  if(type==='products'){
    // Product tab: commodities multiselect only
    const pccComs=[...new Set((state.pcc.filter(r=>r.product===productName)).map(r=>r.commodity))].filter(Boolean).sort();
    const allComs=pccComs.length?pccComs:[...new Set(state.pcc.map(r=>r.commodity).filter(Boolean))].sort();
    const selComs=existing?(existing.commodities||"").split(",").map(s=>s.trim()).filter(Boolean):ctx?.commodity?[ctx.commodity]:[];
    window._cfSelectedComs=[...selComs]; window._cfAllComs=allComs;
    container.innerHTML=`<div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Commodities</label><div id="cf-coms-ms-wrap"></div></div>`;
    buildCfComsMultiselect();

  } else if(type==='pcc'){
    // Commodity tab: one block per commodity, each with coverage + notes
    const pccComs=[...new Set((state.pcc.filter(r=>r.product===productName)).map(r=>r.commodity))].filter(Boolean).sort();
    const allComs=pccComs.length?pccComs:[...new Set(state.pcc.map(r=>r.commodity).filter(Boolean))].sort();
    // Prefill from ctx if coming from PCC page
    const prefillCom = ctx?.commodity || null;
    const prefillCov = ctx?.coverage_level || null;
    // Parse existing blocks
    let existingBlocks = [];
    try { existingBlocks = existing?.pcc_blocks ? JSON.parse(existing.pcc_blocks) : []; } catch(e){}
    if(!existingBlocks.length && prefillCom) existingBlocks = [{commodity:prefillCom,coverage_level:prefillCov||'',notes:''}];
    if(!existingBlocks.length && allComs.length) existingBlocks = allComs.map(c=>({commodity:c,coverage_level:'',notes:''}));
    window._cfPccBlocks = existingBlocks.length ? existingBlocks : [{commodity:'',coverage_level:'',notes:''}];
    window._cfPccAllComs = allComs;
    renderPccBlocks(container);

  } else if(type==='ctrm'){
    // CTRM tab: one block per entry: commodity(dropdown), function(dropdown), coverage, notes + add button
    const pccComs=[...new Set((state.pcc.filter(r=>r.product===productName)).map(r=>r.commodity))].filter(Boolean).sort();
    const allComs=pccComs.length?pccComs:[...new Set(state.pcc.map(r=>r.commodity).filter(Boolean))].sort();
    const allFns=[...new Set((state.ctrm.filter(r=>r.product===productName)).map(r=>r.function_name).filter(Boolean))].sort();
    const allFnsGlobal=allFns.length?allFns:[...new Set(state.ctrm.map(r=>r.function_name).filter(Boolean))].sort();
    // Parse existing blocks
    let existingBlocks = [];
    try { existingBlocks = existing?.ctrm_blocks ? JSON.parse(existing.ctrm_blocks) : []; } catch(e){}
    const prefillCom = ctx?.commodity || null;
    const prefillFn = ctx?.function_name || null;
    const prefillCov = ctx?.coverage_level || null;
    if(!existingBlocks.length && (prefillCom||prefillFn)) existingBlocks=[{commodity:prefillCom||'',function_name:prefillFn||'',coverage_level:prefillCov||'',notes:''}];
    if(!existingBlocks.length) existingBlocks=[{commodity:'',function_name:'',coverage_level:'',notes:''}];
    window._cfCtrmBlocks = existingBlocks;
    window._cfCtrmAllComs = allComs;
    window._cfCtrmAllFns = allFnsGlobal;
    renderCtrmBlocks(container);

  } else if(type==='risk'){
    // Risk tab: category(dropdown), function(filtered dropdown), coverage, notes + add button
    const allCats=[...new Set(state.risk.map(r=>r.category).filter(Boolean))].sort();
    let existingBlocks = [];
    try { existingBlocks = existing?.risk_blocks ? JSON.parse(existing.risk_blocks) : []; } catch(e){}
    const prefillCat = ctx?.category || null;
    const prefillFn = ctx?.function_name || null;
    const prefillCov = ctx?.coverage_level || null;
    if(!existingBlocks.length && (prefillCat||prefillFn)) existingBlocks=[{category:prefillCat||'',function_name:prefillFn||'',coverage_level:prefillCov||'',notes:''}];
    if(!existingBlocks.length) existingBlocks=[{category:'',function_name:'',coverage_level:'',notes:''}];
    window._cfRiskBlocks = existingBlocks;
    window._cfRiskAllCats = allCats;
    renderRiskBlocks(container);
  }
}

  const blocks = window._cfPccBlocks || [];

function cfRiskCatChanged(i){
  const catEl = document.getElementById('cf-risk-cat-'+i);
  const fnEl = document.getElementById('cf-risk-fn-'+i);
  if(!catEl||!fnEl) return;
  const cat = catEl.value;
  const fns = getRiskFnsByCategory(cat);
  fnEl.innerHTML = '<option value="">— Select —</option>'+fns.map(f=>`<option value="${escAttr(f)}">${f}</option>`).join('');
  // Save current block cat
  if(window._cfRiskBlocks && window._cfRiskBlocks[i]) window._cfRiskBlocks[i].category = cat;
}

function addCfBlock(type){
  if(type==='pcc'){
    window._cfPccBlocks = window._cfPccBlocks || [];
    window._cfPccBlocks.push({commodity:'',coverage_level:'',notes:''});
    renderPccBlocks(document.getElementById('cf-dynamic-fields'));
  } else if(type==='ctrm'){
    window._cfCtrmBlocks = window._cfCtrmBlocks || [];
    window._cfCtrmBlocks.push({commodity:'',function_name:'',coverage_level:'',notes:''});
    renderCtrmBlocks(document.getElementById('cf-dynamic-fields'));
  } else if(type==='risk'){
    window._cfRiskBlocks = window._cfRiskBlocks || [];
    window._cfRiskBlocks.push({category:'',function_name:'',coverage_level:'',notes:''});
    renderRiskBlocks(document.getElementById('cf-dynamic-fields'));
  }
}

function removeCfBlock(type, idx){
  if(type==='pcc' && window._cfPccBlocks){ window._cfPccBlocks.splice(idx,1); renderPccBlocks(document.getElementById('cf-dynamic-fields')); }
  else if(type==='ctrm' && window._cfCtrmBlocks){ window._cfCtrmBlocks.splice(idx,1); renderCtrmBlocks(document.getElementById('cf-dynamic-fields')); }
  else if(type==='risk' && window._cfRiskBlocks){ window._cfRiskBlocks.splice(idx,1); renderRiskBlocks(document.getElementById('cf-dynamic-fields')); }
}

function collectCfBlocks(type){
  if(type==='pcc'){
    const blocks = window._cfPccBlocks || [];
    return blocks.map((_,i)=>({
      commodity: document.getElementById('cf-pcc-com-'+i)?.value||'',
      coverage_level: document.getElementById('cf-pcc-cov-'+i)?.value||'',
      notes: document.getElementById('cf-pcc-notes-'+i)?.value||''
    })).filter(b=>b.commodity);
  } else if(type==='ctrm'){
    const blocks = window._cfCtrmBlocks || [];
    return blocks.map((_,i)=>({
      commodity: document.getElementById('cf-ctrm-com-'+i)?.value||'',
      function_name: document.getElementById('cf-ctrm-fn-'+i)?.value||'',
      coverage_level: document.getElementById('cf-ctrm-cov-'+i)?.value||'',
      notes: document.getElementById('cf-ctrm-notes-'+i)?.value||''
    })).filter(b=>b.commodity||b.function_name);
  } else if(type==='risk'){
    const blocks = window._cfRiskBlocks || [];
    return blocks.map((_,i)=>({
      category: document.getElementById('cf-risk-cat-'+i)?.value||'',

async function saveClient(productName, clientId){
  const clientName = document.getElementById("cf-client")?.value?.trim();
  if(!clientName){alert("Client name is required.");return;}
  const region = document.getElementById("cf-region")?.value?.trim()||null;
  const sinceYear = parseInt(document.getElementById("cf-year")?.value)||null;
  const notes = document.getElementById("cf-notes")?.value?.trim()||null;
  const projectName = document.getElementById("cf-project")?.value?.trim()||null;
  const sharepointLink = document.getElementById("cf-sharepoint")?.value?.trim()||null;
  const sourceTable = window._cfType || window._cfCtx?.source_table || null;
  const isVendorCtx = sourceTable === 'vendor';
  const userName = typeof currentUser==="object" ? (currentUser?.user_metadata?.full_name||currentUser?.email||"User") : (currentUser||"User");

  let commodities = null, functionName = null, category = null, coverageLevel = null;
  let pccBlocks = null, ctrmBlocks = null, riskBlocks = null;

  if(isVendorCtx){
    // vendor: just client name, project, region, year, notes
  } else if(sourceTable==='products'){
    commodities = (window._cfSelectedComs||[]).join(", ");
  } else if(sourceTable==='pcc'){
    const blocks = collectCfBlocks('pcc');
    pccBlocks = JSON.stringify(blocks);
    if(blocks.length===1){ commodities=blocks[0].commodity; coverageLevel=blocks[0].coverage_level; notes=blocks[0].notes||notes; }
    else if(blocks.length>1){ commodities=blocks.map(b=>b.commodity).join(', '); }
  } else if(sourceTable==='ctrm'){
    const blocks = collectCfBlocks('ctrm');
    ctrmBlocks = JSON.stringify(blocks);
    if(blocks.length===1){ commodities=blocks[0].commodity; functionName=blocks[0].function_name; coverageLevel=blocks[0].coverage_level; notes=blocks[0].notes||notes; }
    else if(blocks.length>1){ commodities=blocks.map(b=>b.commodity).filter(Boolean).join(', '); functionName=blocks.map(b=>b.function_name).filter(Boolean).join(', '); }
  } else if(sourceTable==='risk'){
    const blocks = collectCfBlocks('risk');
    riskBlocks = JSON.stringify(blocks);
    if(blocks.length===1){ category=blocks[0].category; functionName=blocks[0].function_name; coverageLevel=blocks[0].coverage_level; notes=blocks[0].notes||notes; }
    else if(blocks.length>1){ category=blocks.map(b=>b.category).filter(Boolean).join(', '); functionName=blocks.map(b=>b.function_name).filter(Boolean).join(', '); }
  }

  const pccRowId  = window._cfCtx?.pcc_row_id  || null;
  const ctrmRowId = window._cfCtx?.ctrm_row_id || null;
  const riskRowId = window._cfCtx?.risk_row_id  || null;

  const body = {
    product: isVendorCtx ? null : productName,
    vendor_name: isVendorCtx ? productName : null,
    client_name: clientName,
    project_name: projectName,
    sharepoint_link: sharepointLink,
    commodities, region, since_year: sinceYear,
    notes, function_name: functionName, category, coverage_level: coverageLevel,
    source_table: sourceTable,
    pcc_row_id: pccRowId, ctrm_row_id: ctrmRowId, risk_row_id: riskRowId,
    pcc_blocks: pccBlocks, ctrm_blocks: ctrmBlocks, risk_blocks: riskBlocks,
    created_by: userName
  };
  // Remove null keys to be clean
  Object.keys(body).forEach(k=>{ if(body[k]===null||body[k]===undefined) delete body[k]; });

  try{
    if(clientId&&clientId!=="null"){
      await apiFetch("product_clients",{method:"PATCH",body,params:{id:"eq."+clientId}});
      const idx=(state.clients||[]).findIndex(c=>c.id==clientId);
      if(idx>-1)state.clients[idx]={...state.clients[idx],...body};
    }else{
      const res=await apiFetch("product_clients",{method:"POST",body});
      if(!state.clients)state.clients=[];
      if(res[0])state.clients.push(res[0]);
    }
    document.getElementById("client-form-panel")?.remove();
    const listEl=document.getElementById("clients-list-"+productName.replace(/[^a-z0-9]/gi,'_'));
    const filterFn = isVendorCtx ? (c=>c.vendor_name===productName) : (c=>c.product===productName);
    if(listEl)listEl.innerHTML=renderClientsList(productName,(state.clients||[]).filter(filterFn));
  }catch(e){alert("Error saving: "+e.message);}
}

async function deleteClient(clientId, productName){
  if(!confirm("Delete this feedback record?"))return;
  try{
    await apiFetch("product_clients",{method:"DELETE",params:{id:"eq."+clientId}});

  }catch(e){alert("Error deleting: "+e.message);}
}

function exportToExcel(data, filename, sheetName) {
  if (!data || data.length === 0) { alert("No data to export."); return; }
  if (typeof XLSX === "undefined") { alert("Excel library not loaded. Please refresh."); return; }
  // Clean data - remove internal fields
  const clean = data.map(row => {
    const r = {};
    Object.entries(row).forEach(([k,v]) => {
      if (k.startsWith("_")) return;
      // Format numeric percentage fields
      if (typeof v === "number" && v >= 0 && v <= 1 && k !== "id") {
        r[k] = Math.round(v * 100) + "%";
      } else {
        r[k] = v ?? "";
      }
    });
    return r;
  });
  const ws = XLSX.utils.json_to_sheet(clean);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName || "Data");
  XLSX.writeFile(wb, filename + ".xlsx");
}

      <div style="display:flex;border-bottom:1px solid var(--border)">
        <button onclick="msSelectAll('${id}','${onChangeKey}')" style="flex:1;padding:5px 8px;font-size:11px;background:none;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--accent);font-family:inherit">(All)</button>
        <button onclick="msClearAll('${id}','${onChangeKey}')" style="flex:1;padding:5px 8px;font-size:11px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit">Clear</button>
      </div>
      ${options.map(opt => `<label style="display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--text);border-bottom:1px solid var(--row-border);white-space:nowrap" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''"><input type="checkbox" value="${opt}" ${selected.includes(opt)?'checked':''} onchange="msChange('${id}','${onChangeKey}')" style="margin:0;cursor:pointer;accent-color:var(--accent)">${opt}</label>`).join('')}
    </div>
  </div>`;
}


function toggleMultiSelect(id) {
  // Close all other dropdowns first
  document.querySelectorAll('.ms-dropdown').forEach(d => {
    if (d.id !== 'ms-drop-' + id) d.style.display = 'none';
  });
  const drop = document.getElementById('ms-drop-' + id);
  if (drop) drop.style.display = drop.style.display === 'none' ? 'block' : 'none';
}

// Close dropdowns when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-dropdown').forEach(d => d.style.display = 'none');
  }
});

function msGetSelected(id) {
  const drop = document.getElementById('ms-drop-' + id);
  if (!drop) return [];
  return [...drop.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
}

function msChange(id, filterKey) {
  const selected = msGetSelected(id);
  state.filters[filterKey] = selected;
  state.pages = {};
  // Update button label
  const btn = document.querySelector('#ms-' + id + ' .ms-btn');
  if (btn) {
    const label = selected.length === 0 ? getPlaceholder(filterKey) :
      selected.length === 1 ? selected[0] :
      selected.length + ' selected';
    btn.childNodes[0].textContent = label + ' ';
  }
  render();
}

function msSelectAll(id, filterKey) {
  const drop = document.getElementById('ms-drop-' + id);
  if (!drop) return;
  drop.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
  state.filters[filterKey] = [];
  state.pages = {};
  const btn = document.querySelector('#ms-' + id + ' .ms-btn');
  if (btn) btn.childNodes[0].textContent = getPlaceholder(filterKey) + ' ';
  render();
}

function msClearAll(id, filterKey) {
  msSelectAll(id, filterKey);
}

function getPlaceholder(key) {
  const map = {
    'pcc_prod':'All Products','pcc_com':'All Commodities','pcc_cov':'All Coverage',
    'ctrm_prod':'All Products','ctrm_com':'All Commodities','ctrm_cov':'All Coverage',
    'risk_prod':'All Products','risk_cov':'All Coverage',
    'geo_prod':'All Products','ct_prod':'All Products','con_prod':'All Products'
  };
  return map[key] || 'All';
}

function msFilter(data, field, filterKey) {
  const selected = state.filters[filterKey];
  if (!selected || selected.length === 0) return data;
  return data.filter(r => selected.includes(r[field]));
}


async function init(){
  document.getElementById("section-overview").innerHTML='<div class="loading">Connecting to database...</div>';
  initNav();
  try{
    const[v,p,ct_data,g,pcc,risk,ct,com,clients]=await Promise.all([
      getAll("vendors"),getAll("products"),getAll("product_contacts"),
      getAll("geographic_coverage"),getAll("product_commodities_coverage"),
      getAll("product_function_risk"),getAll("customer_type_coverage"),getAll("commodities"),
      getAll("product_clients")
    ]);
    state.vendors=v;state.products=p;state.contacts=ct_data;
    state.geo=g;state.pcc=pcc;state.risk=risk;state.ct=ct;state.commodities=com;state.clients=clients;
    state.ctrmLoading=true;
    render();
    const ctrm=await getAll("product_function_ctrm");
    state.ctrm=ctrm;state.ctrmLoading=false;
    if(activeTab==="ctrm"||activeTab==="overview")render();
  }catch(e){
    document.getElementById("section-overview").innerHTML=`<div class="loading" style="color:var(--red)">Connection error: ${e.message}</div>`;
  }
}
// ── AUTH (using Supabase REST directly) ──
const AUTH_URL = SB_URL + "/auth/v1";
let currentSession = null;

async function authFetch(path, opts={}) {
  const {method="POST", body} = opts;
  const res = await fetch(AUTH_URL + path, {
    method,
    headers: {
      "apikey": SB_KEY,
      "Content-Type": "application/json"
    },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || data.message || "Auth error");
  return data;
}

function showAuthTab(tab) {
  document.getElementById("auth-login").style.display = tab === "login" ? "block" : "none";
  document.getElementById("auth-register").style.display = tab === "register" ? "block" : "none";
  document.getElementById("tab-login").style.background = tab === "login" ? "var(--accent)" : "var(--bg3)";
  document.getElementById("tab-login").style.color = tab === "login" ? "#fff" : "var(--muted)";
  document.getElementById("tab-register").style.background = tab === "register" ? "var(--accent)" : "var(--bg3)";
  document.getElementById("tab-register").style.color = tab === "register" ? "#fff" : "var(--muted)";
}

async function doLogin() {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  if (!email || !password) { errEl.textContent = "Please enter email and password."; errEl.style.display = "block"; return; }
  try {
    const data = await authFetch("/token?grant_type=password", {body: {email, password}});
    localStorage.setItem("pa_session", JSON.stringify({access_token: data.access_token, user: data.user}));
    onLogin(data.user);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function doRegister() {
  const name = document.getElementById("register-name").value.trim();
  const email = document.getElementById("register-email").value.trim();
  const password = document.getElementById("register-password").value;
  const errEl = document.getElementById("register-error");
  const sucEl = document.getElementById("register-success");
  errEl.style.display = "none"; sucEl.style.display = "none";
  if (!name || !email || !password) { errEl.textContent = "Please fill in all fields."; errEl.style.display = "block"; return; }
  if (password.length < 6) { errEl.textContent = "Password must be at least 6 characters."; errEl.style.display = "block"; return; }
  try {
    await authFetch("/signup", {body: {email, password, data: {full_name: name}}});
    sucEl.textContent = "Account created! You can now sign in with your email and password.";
    sucEl.style.display = "block";
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function showForgotPassword() {
  const email = prompt("Enter your email address:");
  if (!email) return;
  try {
    await authFetch("/recover", {body: {email}});
    alert("Password reset email sent! Check your inbox.");
  } catch(e) { alert("Error: " + e.message); }
}

function onLogin(user) {
  currentUser = user;
  const name = user.user_metadata?.full_name || user.email?.split("@")[0] || "User";
  localStorage.setItem("pa_username", name);
  document.getElementById("auth-screen").style.display = "none";
  document.querySelector("header").style.display = "flex";
  document.querySelector("main").style.display = "block";
  const userInfo = document.createElement("div");
  userInfo.style.cssText = "display:flex;align-items:center;gap:8px;margin-left:8px;padding-left:8px;border-left:1px solid var(--border);white-space:nowrap";
  userInfo.innerHTML = `<span style="font-size:11px;color:var(--muted)">👤 ${name}</span><button onclick="doLogout()" style="padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit">Sign Out</button>`;
  document.querySelector("header").appendChild(userInfo);
  init();
}

function doLogout() {
  localStorage.removeItem("pa_session");
  localStorage.removeItem("pa_username");
  location.reload();
}

async function checkAuth() {
  document.getElementById("auth-screen").style.display = "flex";
  // Check for existing session
  try {
    const saved = localStorage.getItem("pa_session");
    if (saved) {
      const session = JSON.parse(saved);
      if (session?.user) {
        onLogin(session.user);
        return;
      }
    }
  } catch(e) {}
  // Add keyboard listeners
  ["login-email","login-password"].forEach(id => {
    document.getElementById(id)?.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
  });
  ["register-name","register-email","register-password"].forEach(id => {
    document.getElementById(id)?.addEventListener("keydown", e => { if(e.key==="Enter") doRegister(); });
  });
}


window.addEventListener("load", function() {
  try {
    checkAuth();
  } catch(e) {
    // If JS fails, at least show the auth screen with an error
    const screen = document.getElementById("auth-screen");
    if(screen) screen.style.display = "flex";
    const err = document.getElementById("login-error");
    if(err) { err.textContent = "Erro de inicialização: " + e.message; err.style.display = "block"; }
    console.error("Init error:", e);
  }
});

</script>
