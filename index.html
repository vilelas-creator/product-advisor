<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Advisor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--bg2:#0d1424;--bg3:#0a1020;--border:#1e2d40;--text:#e2e8f0;--muted:#64748b;
  --accent:#60a5fa;--green:#22c55e;--yellow:#f59e0b;--purple:#a78bfa;--red:#ef4444;
  --input-bg:#111827;--row-border:#111827;
}
.light{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#1d4ed8;--green:#16a34a;--yellow:#d97706;--purple:#7c3aed;--red:#dc2626;
  --input-bg:#ffffff;--row-border:#f1f5f9;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;transition:background .2s,color .2s;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;min-height:48px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.logo{font-weight:700;font-size:14px;color:var(--accent);white-space:nowrap;}
.sub{font-size:10px;color:var(--muted);margin-left:4px;}
nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap;padding:3px 0;max-width:calc(100% - 280px);}
.tab{padding:4px 10px;font-size:11px;border:none;border-radius:5px;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--accent);color:#fff;font-weight:600;}
.tab:hover:not(.active){background:var(--bg3);}
.theme-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit;white-space:nowrap;}
main{padding:12px;max-width:1600px;margin:0 auto;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.card-head{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg3);}
.card-title{font-weight:600;font-size:13px;}
.card-meta{font-size:11px;color:var(--muted);margin-left:auto;}
.filters{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--bg3);}
input,select{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;outline:none;}
input{width:180px;}
.btn{padding:4px 10px;font-size:11px;font-weight:600;border:none;border-radius:5px;cursor:pointer;font-family:inherit;background:var(--bg3);color:var(--muted);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:#14532d;color:#86efac;border:1px solid #22c55e44;}
.btn-reset{background:#1e3a1e;color:var(--green);border:1px solid var(--green);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:7px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:6px 12px;border-bottom:1px solid var(--row-border);color:var(--text);vertical-align:middle;}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.pager{display:flex;gap:8px;padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);align-items:center;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center;}
.stat-n{font-size:26px;font-weight:700;color:var(--accent);}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.bar-inner{height:100%;border-radius:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
a{color:var(--accent);text-decoration:none;cursor:pointer;}
a:hover{text-decoration:underline;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:22px;}
.fg{margin-bottom:11px;}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;}
.fg textarea{min-height:55px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:inherit;}
.section{display:none;}
.section.active{display:block;}
.loading{padding:28px;text-align:center;color:var(--muted);}
.row-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--row-border);}
.pct-cell{min-width:90px;}
.comment-block{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;font-size:11px;}
.comment-meta{color:var(--muted);font-size:10px;margin-bottom:3px;}
.comment-text{color:var(--text);line-height:1.5;}
@media(max-width:768px){.stat-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}nav{gap:1px;}.tab{padding:3px 6px;font-size:10px;}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="auth-screen" style="display:flex;position:fixed;inset:0;background:var(--bg);z-index:99999;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:36px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:32px;margin-bottom:8px">📊</div>
      <div style="font-weight:700;font-size:20px;color:var(--accent)">Product Advisor</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">CTRM & Risk Management Intelligence</div>
    </div>
    <div id="auth-tabs" style="display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <button id="tab-login" onclick="showAuthTab('login')" style="flex:1;padding:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--accent);color:#fff;font-family:inherit">Sign In</button>
      <button id="tab-register" onclick="showAuthTab('register')" style="flex:1;padding:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--bg3);color:var(--muted);font-family:inherit">Register</button>
    </div>
    <div id="auth-login">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Email</label>
        <input id="login-email" type="email" placeholder="your@email.com" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <button onclick="doLogin()" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">Sign In</button>
      <div id="login-error" style="margin-top:12px;color:var(--red);font-size:12px;text-align:center;display:none"></div>
      <div style="text-align:center;margin-top:16px">
        <a onclick="showForgotPassword()" href="#" style="font-size:12px;color:var(--accent)">Forgot password?</a>
      </div>
    </div>
    <div id="auth-register" style="display:none">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Full Name</label>
        <input id="register-name" type="text" placeholder="Your full name" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Email</label>
        <input id="register-email" type="email" placeholder="your@email.com" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Password</label>
        <input id="register-password" type="password" placeholder="Min. 6 characters" style="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <button onclick="doRegister()" style="width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">Create Account</button>
      <div id="register-error" style="margin-top:12px;color:var(--red);font-size:12px;text-align:center;display:none"></div>
      <div id="register-success" style="margin-top:12px;color:var(--green);font-size:12px;text-align:center;display:none"></div>
    </div>
  </div>
</div>
<header style="display:none">
  <div><span class="logo">Product Advisor</span><span class="sub">CTRM &amp; Risk Management Intelligence</span></div>
  <nav id="nav"></nav>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
</header>
<main style="display:none">
  <div id="section-overview" class="section active"></div>
  <div id="section-vendors" class="section"></div>
  <div id="section-products" class="section"></div>
  <div id="section-commodities" class="section"></div>
  <div id="section-ctrm" class="section"></div>
  <div id="section-risk" class="section"></div>
  <div id="section-geo" class="section"></div>
  <div id="section-customertype" class="section"></div>
  <div id="section-contacts" class="section"></div>
  <div id="section-reporting" class="section"></div>
  <div id="section-import" class="section"></div>
  <div id="section-logs" class="section"></div>
</main>
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <strong id="modal-title" style="font-size:14px"></strong>
      <button class="btn" style="margin-left:auto" onclick="closeModal()">✕ Close</button>
    </div>
    <div id="modal-fields"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary" onclick="saveModal()">💾 Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script>
const SB_URL="https://hhltetlifatsskrfkywu.supabase.co";
const SB_KEY="sb_publishable_qT84fC6EBYcMndu0IW4log_ksZnx5cP";
const GROQ_MODEL="llama-3.3-70b-versatile";
const COV_COLOR={D:"#22c55e",C:"#f59e0b",N:"#ef4444",X:"#64748b"};
const COV_LABEL={D:"Deployed",C:"Capable",N:"Not Capable",X:"N/A"};
const getCode=l=>{if(!l)return"X";if(l.includes("deployed"))return"D";if(l.includes("capable"))return"C";if(l.includes("not currently"))return"N";return"X";};
let isDark=true;
let currentUser="User";

function toggleTheme(){isDark=!isDark;document.body.classList.toggle("light",!isDark);document.getElementById("theme-btn").textContent=isDark?"☀️ Light":"🌙 Dark";}

let state={vendors:[],products:[],contacts:[],ctrm:[],risk:[],geo:[],pcc:[],ct:[],commodities:[],pages:{},filters:{},ctrmLoading:true};
let modalSaveFn=null;

async function getAuthToken(){
  const session=JSON.parse(localStorage.getItem("pa_session")||"{}");
  return session?.access_token||SB_KEY;
}

async function refreshSession(){
  try{
    const session=JSON.parse(localStorage.getItem("pa_session")||"{}");
    const refreshToken=session?.refresh_token;
    if(!refreshToken) return null;
    const res=await fetch(AUTH_URL+"/token?grant_type=refresh_token",{
      method:"POST",
      headers:{"apikey":SB_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({refresh_token:refreshToken})
    });
    if(!res.ok) return null;
    const data=await res.json();
    if(data.access_token){
      const newSession={access_token:data.access_token,refresh_token:data.refresh_token||refreshToken,user:data.user||session.user};
      localStorage.setItem("pa_session",JSON.stringify(newSession));
      return data.access_token;
    }
  }catch(e){}
  return null;
}

async function apiFetch(table,opts={}){
  const{method="GET",body,params={}}=opts;
  let url=SB_URL+"/rest/v1/"+table;
  const qp=new URLSearchParams(params);
  if([...qp].length)url+="?"+qp;
  let token=await getAuthToken();
  let res=await fetch(url,{method,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,"Content-Type":"application/json","Prefer":"return=representation"},body:body?JSON.stringify(body):undefined});
  // If 401, try to refresh token and retry once
  if(res.status===401){
    const newToken=await refreshSession();
    if(newToken){
      token=newToken;
      res=await fetch(url,{method,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,"Content-Type":"application/json","Prefer":"return=representation"},body:body?JSON.stringify(body):undefined});
    } else {
      // Session expired, force re-login
      localStorage.removeItem("pa_session");
      location.reload();
      return [];
    }
  }
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
async function getAll(table){
  const all=[];let offset=0;
  while(true){const b=await apiFetch(table,{params:{limit:1000,offset,order:"id"}});all.push(...b);if(b.length<1000)break;offset+=1000;}
  return all;
}

function bdg(label,color){return`<span class="badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${label||""}</span>`;}
function bar(pct,color){return`<div class="bar-wrap"><div class="bar-inner" style="width:${Math.min(pct,100)}%;background:${color||"var(--accent)"}"></div></div>`;}
function escAttr(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;");}
function pagerHtml(id,page,total,per){
  const pages=Math.ceil(total/per);if(pages<=1)return"";
  return`<div class="pager"><button class="btn" onclick="changePage('${id}',${page-1})" ${page===0?"disabled":""}>← Prev</button><span>Page ${page+1} / ${pages} · ${total.toLocaleString()} records</span><button class="btn" onclick="changePage('${id}',${page+1})" ${page>=pages-1?"disabled":""}>Next →</button></div>`;
}
function changePage(id,p){state.pages[id]=Math.max(0,p);render();}

function navToProduct(name, type) {
  const decoded = decodeURIComponent(name.replace(/%27/g,"'"));
  if (type && type.includes('Risk')) {
    navToTab('risk', 'risk_prod', decoded);
  } else {
    navToTab('ctrm', 'ctrm_prod', decoded);
  }
}

function navToIntelligence(productName){
  state.activeReport = 'intelligence';
  state._intProd = productName;
  state._intSection = 'pcc';
  state._intFPccCom=''; state._intFPccCov='';
  state._intFCtrmFn=''; state._intFCtrmCom=''; state._intFCtrmCov='';
  state._intFRiskCat=''; state._intFRiskFn=''; state._intFRiskCov='';
  setTab('reporting');
}
function navToTab(tab,filterKey,filterVal){if(filterKey)state.filters[filterKey]=filterVal;state.pages={};setTab(tab);}
function sf(key,val){
  state.filters[key]=val;state.pages={};
  const aid=document.activeElement?.id;
  const ss=document.activeElement?.selectionStart;
  const se=document.activeElement?.selectionEnd;
  render();
  if(aid){const el=document.getElementById(aid);if(el){el.focus();try{el.setSelectionRange(ss,se);}catch(e){}}}
}
function resetFilters(prefix){Object.keys(state.filters).forEach(k=>{if(k.startsWith(prefix))delete state.filters[k];});state.pages={};render();}
function resetBtn(prefix){return`<button class="btn btn-reset" onclick="resetFilters('${prefix}')">↺ Reset</button>`;}
function selOpts(options,current,allLabel="All"){return`<option value="">${allLabel}</option>`+options.map(o=>`<option ${o===current?"selected":""}>${o}</option>`).join("");}

// ── COMMENTS ──
function renderComments(comments){
  if(!comments||!comments.length)return'<div style="color:var(--muted);font-size:11px;padding:4px 0">No comments yet</div>';
  return comments.map(c=>`<div class="comment-block"><div class="comment-meta">👤 ${c.user} &nbsp;·&nbsp; ${c.date}</div><div class="comment-text">${c.text}</div></div>`).join("");
}
function addComment(table,id,currentComments){
  const text=prompt("Add comment:");
  if(!text||!text.trim())return;
  const now=new Date();
  const dateStr=now.toLocaleDateString("en-GB")+", "+now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const newComment={user:currentUser,date:dateStr,text:text.trim()};
  const updated=[...(currentComments||[]),newComment];
  apiFetch(table+"?id=eq."+id,{method:"PATCH",body:{capspire_comments:JSON.stringify(updated)}})
    .then(()=>{
      if(table==="vendors")state.vendors=state.vendors.map(v=>v.id===id?{...v,capspire_comments:JSON.stringify(updated)}:v);
      else if(table==="products")state.products=state.products.map(p=>p.id===id?{...p,capspire_comments:JSON.stringify(updated)}:p);
      else if(table==="commodities")state.commodities=state.commodities.map(c=>c.id===id?{...c,capspire_comments:JSON.stringify(updated)}:c);
      render();
    }).catch(e=>alert("Error saving comment: "+e.message));
}
function parseComments(v){try{return v?JSON.parse(v):[];}catch{return[];}}
function commentCell(table,row){
  const comments=parseComments(row.capspire_comments);
  const count=comments.length;
  return`<td style="min-width:200px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted)">${count?count+" comment"+(count>1?"s":""):"No comments"}</span><button class="btn" style="font-size:10px;padding:2px 7px" onclick="showComments('${table}',${row.id})">💬 View</button><button class="btn btn-primary" style="font-size:10px;padding:2px 7px" onclick="addComment('${table}',${row.id},parseComments(${JSON.stringify(row.capspire_comments||"[]")}))">+ Add</button></div></td>`;
}
function showComments(table,id){
  const row=state[table==="vendors"?"vendors":table==="products"?"products":"commodities"].find(r=>r.id===id);
  const comments=parseComments(row?.capspire_comments);
  const d=document.createElement("div");
  d.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
  d.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px"><div style="display:flex;align-items:center;margin-bottom:14px"><strong>capSpire Comments</strong><button onclick="this.closest('div[style]').remove()" style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button></div>${renderComments(comments)}<button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="this.closest('div[style]').remove();addComment('${table}',${id},${JSON.stringify(comments)})">+ Add Comment</button></div>`;
  document.body.appendChild(d);
}

// ── TABS ──

// ── USER IDENTITY ──
function getUsername(){return localStorage.getItem("pa_username")||"";}
function ensureUsername(callback){
  const user=getUsername();if(user){callback(user);return;}
  const ov=document.createElement("div");ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px";
  const bx=document.createElement("div");bx.style.cssText="background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:400px;padding:28px;text-align:center";
  bx.innerHTML="<div style='font-size:28px;margin-bottom:12px'>&#128100;</div><div style='font-weight:700;font-size:16px;margin-bottom:6px'>Welcome to Product Advisor</div><div style='color:var(--muted);font-size:12px;margin-bottom:20px'>Please enter your name to continue.</div>";
  const inp=document.createElement("input");inp.id="uname-inp";inp.placeholder="Your full name...";
  inp.style.cssText="width:100%;padding:10px 14px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;box-sizing:border-box";
  const btn=document.createElement("button");btn.textContent="Continue →";
  btn.style.cssText="width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600";
  box: { bx.appendChild(inp);bx.appendChild(btn);ov.appendChild(bx);document.body.appendChild(ov);setTimeout(()=>inp.focus(),100); }

// ── COMMENTS ──
function parseComments(v){try{return v?JSON.parse(v):[];}catch{return[];}}
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function saveCommentsToState(table,id,updated){
  const str=JSON.stringify(updated);
  if(table==="vendors")state.vendors=state.vendors.map(v=>v.id===id?{...v,capspire_comments:str}:v);
  else if(table==="products")state.products=state.products.map(p=>p.id===id?{...p,capspire_comments:str}:p);
  else if(table==="commodities")state.commodities=state.commodities.map(c=>c.id===id?{...c,capspire_comments:str}:c);
}
let cmtTable="",cmtId=null,cmtList=[];
function renderComments(comments){
  if(!comments||!comments.length)return "<div style='color:var(--muted);font-size:11px;padding:4px 0'>No comments yet</div>";
  return comments.map((c,i)=>
    "<div class='comment-block'><div style='display:flex;align-items:center;gap:6px;margin-bottom:4px'>" +
    "<span class='comment-meta'>&#128100; "+escH(c.user)+" &nbsp;&middot;&nbsp; "+escH(c.date)+"</span>" +
    "<button data-ci='"+i+"' data-ca='edit' style='margin-left:auto;background:none;border:1px solid var(--accent);color:var(--accent);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px'>&#9998; Edit</button>" +
    "<button data-ci='"+i+"' data-ca='del' style='background:none;border:1px solid var(--red);color:var(--red);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px'>&#128465;</button>" +
    "</div><div class='comment-text'>"+escH(c.text)+"</div></div>"
  ).join("");
}
function refreshCmtModal(){const el=document.getElementById("cmt-list");if(el)el.innerHTML=renderComments(cmtList);}
function editCmt(idx){
  const c=cmtList[idx];
  const ov=document.createElement("div");ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:20000;display:flex;align-items:center;justify-content:center;padding:20px";

  const ta=document.createElement("textarea");ta.style.cssText="width:100%;min-height:90px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box";ta.value=c.text;
  const row=document.createElement("div");row.style.cssText="display:flex;gap:8px;margin-top:12px";
  const sb=document.createElement("button");sb.style.cssText="padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit";sb.textContent="Save";
  const cb=document.createElement("button");cb.style.cssText="padding:6px 14px;background:var(--bg3);color:var(--muted);border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit";cb.textContent="Cancel";
  cb.onclick=()=>ov.remove();row.appendChild(sb);row.appendChild(cb);bx.appendChild(t);bx.appendChild(ta);bx.appendChild(row);ov.appendChild(bx);
  document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)ov.remove();};setTimeout(()=>ta.focus(),100);
  sb.onclick=async()=>{const txt=ta.value.trim();if(!txt)return;cmtList[idx]={...c,text:txt};ov.remove();
    try{await apiFetch(cmtTable+"?id=eq."+cmtId,{method:"PATCH",body:{capspire_comments:JSON.stringify(cmtList)}});saveCommentsToState(cmtTable,cmtId,cmtList);refreshCmtModal();render();}catch(e){alert("Error: "+e.message);}};

function delCmt(idx){
  if(!confirm("Delete this comment?"))return;
  cmtList.splice(idx,1);
  apiFetch(cmtTable+"?id=eq."+cmtId,{method:"PATCH",body:{capspire_comments:JSON.stringify(cmtList)}})
    .then(()=>{saveCommentsToState(cmtTable,cmtId,cmtList);refreshCmtModal();render();})
    .catch(e=>alert("Error: "+e.message));

function openAddComment(table,id){
  const sk=table==="vendors"?"vendors":table==="products"?"products":"commodities";
  const row=state[sk].find(r=>r.id===id);
  const existing=parseComments(row?.capspire_comments);
  ensureUsername(user=>{
    const ov=document.createElement("div");ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px";
    const bx=document.createElement("div");bx.style.cssText="background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:460px;padding:20px";

    ta.style.cssText="width:100%;min-height:90px;resize:vertical;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box";
    const btns=document.createElement("div");btns.style.cssText="display:flex;gap:8px;margin-top:12px";
    const sb=document.createElement("button");sb.style.cssText="padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit";sb.textContent="Save";
    const cb=document.createElement("button");cb.style.cssText="padding:6px 14px;background:var(--bg3);color:var(--muted);border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit";cb.textContent="Cancel";
    cb.onclick=()=>ov.remove();btns.appendChild(sb);btns.appendChild(cb);

      catch(e){alert("Error: "+e.message);}
    };
  });
}
function showComments(table,id){
  const sk=table==="vendors"?"vendors":table==="products"?"products":"commodities";
  const row=state[sk].find(r=>r.id===id);
  cmtTable=table;cmtId=id;cmtList=parseComments(row?.capspire_comments);

  d.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";

function commentCell(table,row){
  const comments=parseComments(row.capspire_comments);const count=comments.length;

        "</tr>";
    }).join("");
    document.getElementById("section-logs").innerHTML='<div class="card"><div class="card-head"><span class="card-title">Activity Logs</span><span class="card-meta">'+logs.length+' entries</span><button class="btn" style="margin-left:8px" onclick="renderLogs()">Refresh</button></div>'+(logs.length===0?'<div class="loading">No activity yet</div>':'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase;white-space:nowrap">Date & Time</th><th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase">User</th><th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase">Action</th><th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase">Table</th><th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase">Record</th><th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase">Details</th></tr></thead><tbody>'+rows+'</tbody></table></div>')+'</div>';

function renderReporting(){
  const activeReport = state.activeReport || null;
  const el = document.getElementById("section-reporting");
  const REPORTS = [
    {id:"heatmap",     icon:"🔥", title:"Coverage Heatmap",            desc:"Product × Commodity matrix with coverage levels"},
    {id:"vendor",      icon:"🏢", title:"Vendor Landscape",             desc:"Side-by-side vendor comparison with key metrics"},
    {id:"market",      icon:"🌾", title:"Market Coverage by Commodity", desc:"How many products cover each commodity and which vendors"},
    {id:"intelligence",icon:"🧠", title:"Product Intelligence",         desc:"Official data + capSpire field feedback drill-down by product"},
  ];
  if(!activeReport){
    el.innerHTML="";
    const wrap=document.createElement("div"); wrap.style.cssText="padding:20px";
    wrap.innerHTML=`<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:700;color:var(--text)">📈 Reporting</h2><p style="color:var(--muted);font-size:12px;margin-top:4px">Select a report to view</p></div>`;
    const grid=document.createElement("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px";
    REPORTS.forEach(r=>{
      const card=document.createElement("div");
      card.style.cssText="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px 22px;cursor:pointer;transition:all .15s";
      card.innerHTML=`<div style="font-size:28px;margin-bottom:10px">${r.icon}</div><div style="font-weight:700;font-size:14px;margin-bottom:6px;color:var(--text)">${r.title}</div><div style="font-size:12px;color:var(--muted);line-height:1.5">${r.desc}</div><div style="margin-top:14px;display:inline-block;padding:4px 12px;background:var(--accent);color:#fff;border-radius:5px;font-size:11px;font-weight:600">View Report →</div>`;
      card.onmouseover=()=>{card.style.borderColor="var(--accent)";card.style.transform="translateY(-2px)";};
      card.onmouseout=()=>{card.style.borderColor="var(--border)";card.style.transform="";};
      card.onclick=()=>{state.activeReport=r.id;renderReporting();};
      grid.appendChild(card);
    });
    wrap.appendChild(grid); el.appendChild(wrap); return;
  }
  const report=REPORTS.find(r=>r.id===activeReport);
  const backBtn=`<button onclick="state.activeReport=null;renderReporting()" class="btn" style="margin-bottom:16px;display:inline-flex;align-items:center;gap:5px">← Back</button>`;
  if(activeReport==="heatmap") renderReportHeatmap(el,backBtn,report);
  else if(activeReport==="vendor") renderReportVendor(el,backBtn,report);
  else if(activeReport==="market") renderReportMarket(el,backBtn,report);
  else if(activeReport==="intelligence") renderReportIntelligence(el,backBtn,report);
}

function normName(s){ return (s||"").toLowerCase().trim().replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim(); }
function findExact(arr,field,val){ const r=(arr||[]).find(r=>(r[field]||"")===val); return r?.[field]||val; }

function renderReportHeatmap(el,backBtn,report){
  const pcc=state.pcc||[];
  const products=[...new Set(pcc.map(r=>r.product))].filter(Boolean).sort();
  const COL_ORDER=["Power","Natural Gas","HC Liquids","PetroChem / Chemicals","Coal","LNG","Bulk","Break Bulk","Container","Base Metals","Ferrous","Concentrates","Precious Metals","North America CO2 & Emissions","Europe CO2 & Emissions","FX"];
  const allComs=[...new Set(pcc.map(r=>r.commodity))].filter(Boolean);
  const normCom=s=>(s||"").trim().toLowerCase();
  const orderedComs=[]; const usedNorm=new Set();
  COL_ORDER.forEach(col=>{const match=allComs.find(c=>normCom(c)===normCom(col));if(match&&!usedNorm.has(normCom(match))){orderedComs.push(match);usedNorm.add(normCom(match));}});
  allComs.sort().forEach(c=>{if(!usedNorm.has(normCom(c))){orderedComs.push(c);usedNorm.add(normCom(c));}});

  // Official coverage map: product||commodity -> coverage_level
  const map={};
  pcc.forEach(r=>{map[r.product+"||"+r.commodity]=r.coverage_level;});

  // capSpire feedback map: product -> [ {client, comMap:{commodity->coverage}} ]
  // Each entry = one feedback record with its commodity coverages
  const fbByProduct={};
  (state.clients||[]).forEach(c=>{
    if(!c.product) return;
    const comMap={};
    // From pcc_blocks
    try{ if(c.pcc_blocks) JSON.parse(c.pcc_blocks).forEach(b=>{ if(b.commodity) comMap[b.commodity]=b.coverage_level||""; }); }catch(e){}
    // From commodities field (product tab - no coverage per commodity)
    if(!Object.keys(comMap).length && c.commodities){
      c.commodities.split(",").map(s=>s.trim()).filter(Boolean).forEach(com=>{
        comMap[com]=c.coverage_level||"";
      });
    }
    if(!Object.keys(comMap).length) return;
    if(!fbByProduct[c.product]) fbByProduct[c.product]=[];
    fbByProduct[c.product].push({client:c.client_name||"?", comMap});
  });

  const covColor=v=>v==="Covered"?"#22c55e":v&&v.includes("Partial")?"#f59e0b":v==="Not Covered"?"#ef4444":"transparent";
  const covLetter=v=>v==="Covered"?"C":v&&v.includes("Partial")?"P":v==="Not Covered"?"✗":"–";
  const fbColor=v=>v==="Covered"||v==="Deployed"?"#22c55e":v&&(v.includes("Partial")||v==="Capable")?"#f59e0b":v&&v.includes("Not")?"#ef4444":"#475569";

  // Build table rows
  let tbodyHtml="";
  products.forEach(p=>{
    const fbEntries=fbByProduct[p]||[];
    const hasFb=fbEntries.length>0;
    const pid="hm-"+p.replace(/[^a-z0-9]/gi,"_");

    // Official row
    tbodyHtml+=`<tr>
      <td style="position:sticky;left:0;z-index:1;background:var(--bg2);padding:5px 10px;border-bottom:1px solid var(--row-border);border-right:1px solid var(--border);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis">
        <a href="#" onclick="navToPccFromHeatmap('${escAttr(p)}');return false;" style="font-weight:600;color:var(--accent);text-decoration:none">${p}</a>
        ${hasFb?`<button onclick="const rows=document.querySelectorAll('.hm-fb-${pid}');rows.forEach(r=>r.style.display=r.style.display==='none'?'table-row':'none');this.textContent=this.textContent.trim()==='▼'?'▲':'▼'" style="margin-left:6px;background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px;padding:0">▼</button>`:""}
      </td>
      ${orderedComs.map(c=>{
        const v=map[p+"||"+c];
        const col=covColor(v);
        return`<td style="text-align:center;padding:3px;border-bottom:1px solid var(--row-border)">
          <span onclick="navToCtrmFromHeatmap('${escAttr(p)}','${escAttr(c)}')" title="${p} · ${c}: ${v||'–'}" style="display:inline-block;width:22px;height:22px;border-radius:4px;background:${col};color:#fff;font-size:9px;font-weight:700;line-height:22px;opacity:${v?"1":".18"};cursor:${v?"pointer":"default"}">${covLetter(v)}</span>
        </td>`;
      }).join("")}
    </tr>`;

    // One feedback row per client
    fbEntries.forEach(fb=>{
      tbodyHtml+=`<tr class="hm-fb-${pid}" style="display:none;background:var(--bg)">
        <td style="position:sticky;left:0;z-index:1;background:var(--bg);padding:3px 10px 3px 28px;border-bottom:1px solid var(--row-border);border-right:2px solid var(--accent);white-space:nowrap;font-size:11px;color:var(--accent);font-style:italic">
          💬 ${escH(fb.client)}
        </td>
        ${orderedComs.map(c=>{
          const cv=fb.comMap[c];
          if(!cv) return`<td style="background:var(--bg);border-bottom:1px solid var(--row-border)"></td>`;
          const col=fbColor(cv);
          const letter=cv==="Covered"||cv==="Deployed"?"C":cv&&(cv.includes("Partial")||cv==="Capable")?"P":cv&&cv.includes("Not")?"✗":"?";
          return`<td style="text-align:center;padding:3px;background:var(--bg);border-bottom:1px solid var(--row-border)">
            <span onclick="navToCtrmFromHeatmap('${escAttr(p)}','${escAttr(c)}')" title="${fb.client} feedback: ${cv}" style="display:inline-block;width:22px;height:22px;border-radius:4px;border:2px solid ${col};background:transparent;color:${col};font-size:9px;font-weight:700;line-height:18px;cursor:pointer">${letter}</span>
          </td>`;
        }).join("")}
      </tr>`;
    });
  });

  el.innerHTML=`<div style="padding:16px">${backBtn}<div class="card">
    <div class="card-head">
      <span class="card-title">${report.icon} ${report.title}</span>
      <span style="font-size:10px;color:var(--muted);margin-left:8px">🟢 Covered &nbsp;🟡 Partial &nbsp;🔴 Not Covered &nbsp;· &nbsp;▼ = capSpire feedback</span>
      <button onclick="exportHeatmapExcel()" class="btn btn-success" style="margin-left:auto;font-size:11px;padding:4px 10px">⬇ Excel</button>
    </div>
    <div style="overflow:auto;max-height:74vh">
    <table style="font-size:11px;border-collapse:collapse;min-width:100%">
    <thead><tr>
      <th style="position:sticky;left:0;z-index:3;background:var(--bg3);padding:6px 10px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;min-width:190px">PRODUCT</th>
      ${orderedComs.map(c=>`<th style="padding:4px 5px;font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;text-align:center;background:var(--bg3)" title="${c}">${c}</th>`).join("")}
    </tr></thead>
    <tbody>${tbodyHtml}</tbody>
    </table></div></div></div>`;
  window._heatmapData={products,commodities:orderedComs,map,fbByProduct};
}

function navToPccFromHeatmap(product){
  // Link to Product Intelligence report for this product
  state.activeReport='intelligence';
  state._intProd=product;
  state._intSection='pcc';
  state._intFPccCom='';state._intFPccCov='';
  state._intFCtrmFn='';state._intFCtrmCom='';
  state._intFRiskCat='';state._intFRiskFn='';
  setTab('reporting');
}

function navToCtrmFromHeatmap(product, commodity){
  // Link to CTRM coverage page filtered by product + commodity
  Object.keys(state.filters).forEach(k=>{if(k.startsWith('ctrm_'))delete state.filters[k];});
  state.filters['ctrm_prod']=[product];
  state.filters['ctrm_com']=[commodity];
  state.pages={};
  setTab('ctrm');
}

function exportHeatmapExcel(){
  const{products,commodities,map,fbByProduct}=window._heatmapData||{};
  if(!products||!commodities){alert("No data to export.");return;}

  const covBg=v=>v==="Covered"?"#16a34a":v&&v.includes("Partial")?"#d97706":v==="Not Covered"?"#dc2626":"#ffffff";
  const covLetter=v=>v==="Covered"?"C":v&&v.includes("Partial")?"P":v==="Not Covered"?"✗":"–";
  const fbBg=v=>v==="Covered"||v==="Deployed"?"#16a34a":v&&(v.includes("Partial")||v==="Capable")?"#d97706":v&&v.includes("Not")?"#dc2626":"#f1f5f9";
  const fbLetter=v=>v==="Covered"||v==="Deployed"?"C":v&&(v.includes("Partial")||v==="Capable")?"P":v&&v.includes("Not")?"✗":"?";

  function td(text,bg,color,bold,italic,leftBorder){
    let s="padding:4px 8px;font-size:11px;white-space:nowrap;background:"+(bg||"#ffffff")+";color:"+(color||"#000000")+";";
    if(bold) s+="font-weight:bold;";
    if(italic) s+="font-style:italic;";
    if(leftBorder) s+="border-left:3px solid #2563eb;";
    return "<td style='"+s+"'>"+text+"</td>";
  }

  let html="<html><head><meta charset='utf-8'></head><body>";
  html+="<table border='1' cellspacing='0' cellpadding='0' style='border-collapse:collapse;font-family:Arial,sans-serif;font-size:11px'>";
  html+="<tr>"+td("PRODUCT","#e2e8f0","#000000",true)+commodities.map(c=>td(c,"#e2e8f0","#000000",true)).join("")+"</tr>";

  products.forEach(p=>{
    html+="<tr>"+td(p,"#ffffff","#1d4ed8",true);
    commodities.forEach(c=>{
      const v=map[p+"||"+c];
      html+=td(v?covLetter(v):"","#ffffff"===covBg(v)?covBg(v):covBg(v),v?"#ffffff":"#94a3b8",!!v);
    });
    html+="</tr>";
    (fbByProduct[p]||[]).forEach(fb=>{
      html+="<tr>"+td("    💬 "+fb.client,"#eff6ff","#1d4ed8",false,true,true);
      commodities.forEach(c=>{
        const cv=fb.comMap[c];
        html+=cv?td(fbLetter(cv),fbBg(cv),"#ffffff",true):td("","#ffffff","");
      });
      html+="</tr>";
    });
  });

  html+="</table></body></html>";
  const blob=new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="coverage_heatmap.xls"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}


function renderReportVendor(el,backBtn,report){
  const vendors=state.vendors||[]; const products=state.products||[]; const pcc=state.pcc||[]; const geo=state.geo||[]; const contacts=state.contacts||[];
  const fVQ   = state._vLandQ   || "";
  const fVend = state._vLandV   || [];
  const fCom  = state._vLandC   || [];
  const data=vendors.map(v=>{
    const vn=normName(v.vendor_name);
    const vProds=products.filter(p=>normName(p.vendor)===vn||normName(p.vendor).includes(vn.slice(0,12))||vn.includes(normName(p.vendor).slice(0,12)));
    const ctrmProds=vProds.filter(p=>(p.product_type||"").toLowerCase().includes("ctrm"));
    const riskProds=vProds.filter(p=>(p.product_type||"").toLowerCase().includes("risk"));
    const vPcc=pcc.filter(p=>vProds.some(vp=>normName(vp.product_name)===normName(p.product)));
    const covTotal=vPcc.length; const covCovered=vPcc.filter(p=>p.coverage_level==="Covered").length;
    const covPartial=vPcc.filter(p=>p.coverage_level&&p.coverage_level.includes("Partial")).length;
    const covNot=vPcc.filter(p=>p.coverage_level==="Not Covered").length;
    const covPct=covTotal?Math.round(covCovered/covTotal*100):0;
    const coms=[...new Set(vPcc.map(p=>p.commodity))].filter(Boolean);
    const vGeo=geo.filter(g=>vProds.some(vp=>normName(vp.product_name)===normName(g.product)));
    const regionCols=Object.keys(vGeo[0]||{}).filter(k=>!["id","product","product_type","vendor"].includes(k));
    const covRegions=regionCols.filter(c=>vGeo.some(r=>r[c]==="Yes"||r[c]===true||r[c]==="TRUE"));
    const vContacts=contacts.filter(c=>normName(c.vendor)===vn||normName(c.vendor).includes(vn.slice(0,12)));
    const vFeedback=(state.clients||[]).filter(c=>c.vendor_name&&normName(c.vendor_name)===normName(v.vendor_name||""));
    return{v,vProds,ctrmProds,riskProds,covPct,covCovered,covPartial,covNot,covTotal,coms,covRegions,vContacts,vFeedback};
  }).filter(d=>d.vProds.length>0).sort((a,b)=>b.vProds.length-a.vProds.length);
  // Apply filters
  let filtered = data;
  if(fVQ) filtered = filtered.filter(d=>normName(d.v.vendor_name).includes(normName(fVQ)));
  if(fVend.length) filtered = filtered.filter(d=>fVend.includes(d.v.vendor_name));
  if(fCom.length) filtered = filtered.filter(d=>d.coms.some(c=>fCom.includes(c)));
  el.innerHTML=""; const wrap=document.createElement("div"); wrap.style.cssText="padding:16px";
  // Build filter options
  const allVendorNames = data.map(d=>d.v.vendor_name).sort();
  const allComs = [...new Set(data.flatMap(d=>d.coms))].sort();

  const hdr=document.createElement("div"); hdr.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap";
  hdr.innerHTML=`${backBtn}<span class="card-title" style="font-size:15px">${report.icon} ${report.title}</span><span style="color:var(--muted);font-size:12px">${filtered.length} vendors</span>`;
  wrap.appendChild(hdr);

  const filtersDiv=document.createElement("div");
  filtersDiv.className="filters";
  filtersDiv.style.cssText="margin-bottom:16px";
  filtersDiv.innerHTML=
    '<input id="vland-q" type="text" placeholder="Search vendors..." value="'+escAttr(fVQ)+'" '
    +'oninput="state._vLandQ=this.value;clearTimeout(window._vLandTimer);window._vLandTimer=setTimeout(function(){var v=document.getElementById('vland-q');var pos=v?v.selectionStart:0;renderReporting();setTimeout(function(){var el=document.getElementById('vland-q');if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}},0);},300)" '
    +'style="padding:5px 10px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;min-width:180px">'
    +createMultiSelect("vland-v", allVendorNames, fVend, "All Vendors", "_vLandV")
    +createMultiSelect("vland-c", allComs, fCom, "All Commodities", "_vLandC")
    +'<button class="btn btn-reset" onclick="state._vLandQ='';state._vLandV=[];state._vLandC=[];renderReporting()">&#8635; Reset</button>';
  wrap.appendChild(filtersDiv);
